<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEVOBet - Dama | Ethiopian Checkers Multiplayer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 12px 25px;
            border-radius: 60px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #ffd700;
            color: #0f172a;
        }

        .game-logo {
            font-size: 26px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }

        .game-logo i {
            margin-right: 10px;
            color: #ffd700;
        }

        .game-balance {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 24px;
            border-radius: 40px;
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            border: 1px solid #ffd700;
        }

        .game-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-title h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        .board-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .players-info {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .player-info-card {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border-radius: 28px;
            padding: 15px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .player-info-card.red-turn {
            border: 2px solid #e74c3c;
            box-shadow: 0 0 15px rgba(231,76,60,0.5);
            background: rgba(231,76,60,0.15);
        }

        .player-info-card.black-turn {
            border: 2px solid #bdc3c7;
            box-shadow: 0 0 15px rgba(189,195,199,0.5);
            background: rgba(44,62,80,0.4);
        }

        .player-color {
            font-size: 22px;
            font-weight: bold;
        }

        .player-color.red { color: #e74c3c; text-shadow: 0 0 3px darkred; }
        .player-color.black { color: #ecf0f1; text-shadow: 0 0 2px gray; }

        .player-name-display {
            font-size: 15px;
            margin-top: 6px;
            color: #ffd700;
        }

        .pieces-count {
            font-size: 18px;
            margin-top: 8px;
            font-weight: bold;
            color: white;
        }

        .turn-indicator {
            font-size: 12px;
            margin-top: 10px;
            padding: 5px 12px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
        }
        .turn-red { background: #e74c3c; color: white; }
        .turn-black { background: #2c3e50; color: white; }

        .board-container {
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        .board {
            background: #deb887;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        table {
            border-collapse: collapse;
            margin: 0 auto;
        }

        td {
            width: 68px;
            height: 68px;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            transition: 0.1s;
        }

        @media (max-width: 650px) {
            td { width: 44px; height: 44px; }
            .piece { width: 36px; height: 36px; font-size: 22px; }
        }

        .dark-cell {
            background-color: #8B4513;
        }
        .light-cell {
            background-color: #F5DEB3;
        }

        .dark-cell.selected {
            background-color: #ffb347;
            box-shadow: inset 0 0 0 3px #ffd700;
        }

        .dark-cell.valid-move {
            background-color: #2ecc71;
            position: relative;
        }
        .dark-cell.valid-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            background: rgba(255,255,200,0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .piece {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 8px black;
        }

        .piece.red {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #a51f1f);
            color: white;
            border: 2px solid gold;
        }
        .piece.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
            color: #ddd;
            border: 2px solid #b8860b;
        }
        .piece.king::after {
            content: '👑';
            position: absolute;
            font-size: 22px;
            margin-left: 20px;
            margin-top: -20px;
        }

        .chat-section {
            background: rgba(30,30,45,0.95);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            height: 480px;
            backdrop-filter: blur(8px);
            border: 1px solid #ffd70055;
        }

        .chat-header {
            padding: 16px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border-radius: 28px 28px 0 0;
            color: gold;
            font-weight: bold;
        }

        .voice-btn {
            background: rgba(255,215,0,0.2);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
        }
        .voice-btn.active {
            background: #e67e22;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(230,126,34,0.6);}
            100% { box-shadow: 0 0 0 8px rgba(230,126,34,0);}
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            word-wrap: break-word;
        }
        .message.sent { align-self: flex-end; background: #ffd700; color: #1e1e2f; }
        .message.received { align-self: flex-start; background: #2d2d44; color: #f0f0f0; }
        .message.system { align-self: center; background: #34495e; color: #f1c40f; font-size: 11px; max-width: 90%; text-align: center; }

        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 10px;
            border-top: 1px solid #ffd70055;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #0f172a;
            color: white;
        }
        .chat-input-area button {
            background: #ffd700;
            border: none;
            padding: 0 18px;
            border-radius: 40px;
            font-weight: bold;
        }

        .online-players {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px;
            margin-top: 20px;
            border: 1px solid #ffd70066;
        }

        .auto-match-btn {
            width: 100%;
            background: linear-gradient(95deg, #e67e22, #f39c12);
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .bet-input input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: #0f172a;
            border: 1px solid #ffd700;
            color: white;
            text-align: center;
        }

        .result-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0f1cee;
            backdrop-filter: blur(12px);
            padding: 30px 50px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            border: 2px solid gold;
        }
        .result-win { color: #2ecc71; font-size: 32px; }
        .result-loss { color: #e74c3c; font-size: 32px; }

        .countdown-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
        }
        .countdown-number {
            font-size: 100px;
            color: #ffd700;
            font-weight: bold;
        }

        .game-status {
            background: #000000aa;
            border-radius: 40px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            color: white;
        }
        .control-btn.surrender {
            background: #c0392b;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <a href="games.html" class="back-btn"><i class="fas fa-arrow-left"></i> Games</a>
        <div class="game-logo"><i class="fas fa-crown"></i> VEVOBet DAMA</div>
        <div class="game-balance"><i class="fas fa-coins"></i> <span id="gameBalance">0</span> VEVO</div>
    </div>
    <div class="game-title">
        <h1><i class="fas fa-chess-board"></i> ETHIOPIAN DAMA</h1>
        <p>Classic 8x8 Checkers | Bet & Win 80% of Pot | Voice + Chat</p>
    </div>
    <div class="game-layout">
        <div class="board-section">
            <div class="players-info">
                <div class="player-info-card" id="redPlayerCard"><div class="player-color red">🔴 RED</div><div id="redPlayerName">---</div><div id="redPiecesCount">12</div><div id="redTurnIndicator" class="turn-indicator turn-red">Turn</div></div>
                <div class="player-info-card" id="blackPlayerCard"><div class="player-color black">⚫ BLACK</div><div id="blackPlayerName">---</div><div id="blackPiecesCount">12</div><div id="blackTurnIndicator" class="turn-indicator turn-black">Wait</div></div>
            </div>
            <div class="board-container"><div class="board" id="board"></div></div>
            <button class="control-btn surrender" id="surrenderBtn" onclick="window.surrenderGame?.()">🏳️ Surrender</button>
            <div class="game-status" id="gameStatus">⚡ Create or Auto Match to play for VEVO</div>
        </div>
        <div>
            <div class="chat-section">
                <div class="chat-header"><span><i class="fas fa-comment-dots"></i> Live Chat</span><button class="voice-btn" id="voiceChatBtn" onclick="window.toggleVoiceChat?.()"><i class="fas fa-microphone"></i></button></div>
                <div class="chat-messages" id="chatMessages"><div class="message system">🎙️ Welcome! Challenge others or auto-match.</div></div>
                <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Message..."><button onclick="window.sendMessage?.()">Send</button></div>
            </div>
            <div class="online-players">
                <h4><i class="fas fa-users"></i> Online <span id="onlineCount">0</span></h4>
                <div class="player-list" id="onlinePlayersList">Loading...</div>
                <div class="bet-input"><label>💰 BET AMOUNT</label><input type="number" id="challengeBet" value="50" min="10" step="10"></div>
                <button class="auto-match-btn" onclick="window.autoMatch?.()"><i class="fas fa-meteor"></i> AUTO MATCH</button>
                <button class="auto-match-btn" style="background:#2c3e50; margin-top:8px" onclick="window.createGame?.()"><i class="fas fa-plus-circle"></i> CREATE GAME (RED)</button>
            </div>
        </div>
    </div>
</div>
<div id="resultModal" class="result-display" style="display:none;"><div id="resultContent"></div></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8", authDomain: "newporoject-c6f66.firebaseapp.com", databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com", projectId: "newporoject-c6f66", storageBucket: "newporoject-c6f66.appspot.com", messagingSenderId: "733557611631", appId: "1:733557611631:web:02c9377f56d614ff3b019a" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let currentUser=null, userBalance=0, currentGameId=null, myColor=null, gameActive=false;
    let board=[], currentPlayer='red', selectedRow=null, selectedCol=null, redPieces=12, blackPieces=12;
    let gameListener=null, chatListener=null, onlineListener=null, countdownInterval=null;
    let localStream=null;

    function showNotification(msg,type){ const n=document.createElement('div'); n.className='notification'; n.style.position='fixed'; n.style.top='20px'; n.style.right='20px'; n.style.background=type==='success'?'#27ae60':'#e67e22'; n.style.color='white'; n.style.padding='12px 20px'; n.style.borderRadius='30px'; n.style.zIndex=9999; n.innerHTML=msg; document.body.appendChild(n); setTimeout(()=>n.remove(),2800);}
    function updateBalanceDisplay(){ document.getElementById('gameBalance').innerText=userBalance; }
    async function loadUserData(){ if(!currentUser)return; const snap=await db.ref(`users/${currentUser.uid}`).once('value'); if(snap.exists()){ userBalance=snap.val().balance||100; }else{ await db.ref(`users/${currentUser.uid}`).set({email:currentUser.email,name:currentUser.displayName||currentUser.email.split('@')[0],balance:100,createdAt:Date.now()}); userBalance=100; } updateBalanceDisplay();}
    async function updateUserBalance(newBalance){ await db.ref(`users/${currentUser.uid}`).update({balance:newBalance}); userBalance=newBalance; updateBalanceDisplay();}
    function setUserOnline(){ if(!currentUser)return; db.ref(`onlineUsers/${currentUser.uid}`).set({uid:currentUser.uid,name:currentUser.displayName||currentUser.email.split('@')[0],balance:userBalance,inGame:!!currentGameId,lastSeen:Date.now()}).onDisconnect().remove();}

    function initBoard(){
        board=Array(8).fill().map(()=>Array(8).fill(null));
        for(let r=0;r<3;r++) for(let c=0;c<8;c++) if((r+c)%2===1) board[r][c]={color:'red',king:false};
        for(let r=5;r<8;r++) for(let c=0;c<8;c++) if((r+c)%2===1) board[r][c]={color:'black',king:false};
        redPieces=12; blackPieces=12; selectedRow=null; selectedCol=null;
    }
    function getValidMoves(row,col){
        const piece=board[row][col]; if(!piece||piece.color!==currentPlayer) return [];
        let dirs=piece.king?[[-1,-1],[-1,1],[1,-1],[1,1]]:(piece.color==='red'?[[1,-1],[1,1]]:[[-1,-1],[-1,1]]);
        let moves=[];
        for(let [dr,dc] of dirs){ let nr=row+dr,nc=col+dc; if(nr>=0&&nr<8&&nc>=0&&nc<8&&!board[nr][nc]) moves.push({row:nr,col:nc,capture:null}); }
        for(let [dr,dc] of dirs){ let midRow=row+dr,midCol=col+dc, jumpRow=row+dr*2,jumpCol=col+dc*2;
            if(jumpRow>=0&&jumpRow<8&&jumpCol>=0&&jumpCol<8){ let mid=board[midRow][midCol]; if(mid&&mid.color!==currentPlayer&&!board[jumpRow][jumpCol]) moves.push({row:jumpRow,col:jumpCol,capture:{row:midRow,col:midCol}});}
        } return moves;
    }
    function hasAnyValid(color){ for(let i=0;i<8;i++) for(let j=0;j<8;j++) if(board[i][j]?.color===color && getValidMoves(i,j).length>0) return true; return false; }
    function makeMove(fr,fc,tr,tc,capture){
        let piece=board[fr][fc]; board[tr][tc]={...piece}; board[fr][fc]=null;
        if(capture){ board[capture.row][capture.col]=null; if(piece.color==='red') blackPieces--; else redPieces--; }
        if((piece.color==='red'&&tr===7)||(piece.color==='black'&&tr===0)) board[tr][tc].king=true;
        let extra=getValidMoves(tr,tc).filter(m=>m.capture);
        if(extra.length>0 && capture){ selectedRow=tr; selectedCol=tc; renderBoard(); return false; }
        currentPlayer=currentPlayer==='red'?'black':'red'; selectedRow=null; selectedCol=null;
        if(redPieces===0||blackPieces===0||!hasAnyValid(currentPlayer)) endGame(currentPlayer==='red'?'black':'red');
        return true;
    }
    async function endGame(winner){
        if(!gameActive) return; gameActive=false;
        if(currentGameId){
            const snap=await db.ref(`damaGames/${currentGameId}`).once('value'); const game=snap.val();
            if(game&&game.status==='active'){
                const winnerPayout=game.winnerPayout; const isWinner=(winner==='red'&&game.redPlayerId===currentUser?.uid)||(winner==='black'&&game.blackPlayerId===currentUser?.uid);
                if(isWinner){ await updateUserBalance(userBalance+winnerPayout); showResult(true,winnerPayout); addChatMessage('System',`🎉 You won ${winnerPayout} VEVO!`,true);}
                else { showResult(false,0); addChatMessage('System',`💀 You lost!`,true); }
                await db.ref(`damaGames/${currentGameId}`).update({status:'completed',winner:winner,winnerId:winner==='red'?game.redPlayerId:game.blackPlayerId,completedAt:Date.now()});
            }
        }
        updateGameStatusMsg();
    }
    function renderBoard(){
        const container=document.getElementById('board'); const table=document.createElement('table');
        for(let r=0;r<8;r++){ let tr=document.createElement('tr');
            for(let c=0;c<8;c++){ let td=document.createElement('td'); let isDark=(r+c)%2===1; td.className=isDark?'dark-cell':'light-cell';
                if(selectedRow===r&&selectedCol===c) td.classList.add('selected');
                let moves=(selectedRow!==null)?getValidMoves(selectedRow,selectedCol):[]; if(moves.some(m=>m.row===r&&m.col===c)) td.classList.add('valid-move');
                let piece=board[r][c]; if(piece){ let div=document.createElement('div'); div.className=`piece ${piece.color}`; if(piece.king) div.classList.add('king'); div.innerHTML=piece.king?'👑':'●'; td.appendChild(div); }
                td.onclick=(function(rr,cc){ return()=>handleCellClick(rr,cc); })(r,c); tr.appendChild(td);
            } table.appendChild(tr);
        } container.innerHTML=''; container.appendChild(table);
        document.getElementById('redPiecesCount').innerText=`${redPieces}`; document.getElementById('blackPiecesCount').innerText=`${blackPieces}`;
        if(currentPlayer==='red'){ document.getElementById('redTurnIndicator').style.display='inline-block'; document.getElementById('blackTurnIndicator').style.display='none'; document.getElementById('redPlayerCard').classList.add('red-turn'); document.getElementById('blackPlayerCard').classList.remove('black-turn');}
        else{ document.getElementById('redTurnIndicator').style.display='none'; document.getElementById('blackTurnIndicator').style.display='inline-block'; document.getElementById('redPlayerCard').classList.remove('red-turn'); document.getElementById('blackPlayerCard').classList.add('black-turn');}
    }
    function handleCellClick(row,col){
        if(!gameActive||!currentGameId){ showNotification("No active game!","error"); return; }
        if(currentPlayer!==myColor){ showNotification(`Not your turn!`, "error"); return; }
        let piece=board[row][col];
        if(selectedRow!==null){
            let moves=getValidMoves(selectedRow,selectedCol); let valid=moves.find(m=>m.row===row&&m.col===col);
            if(valid){ makeMove(selectedRow,selectedCol,row,col,valid.capture); renderBoard(); updateGameStatusMsg();
                if(currentGameId) db.ref(`damaGames/${currentGameId}`).update({boardState:board,currentPlayer:currentPlayer,redPieces:redPieces,blackPieces:blackPieces,lastMove:Date.now()});
            } else { selectedRow=null; handleCellClick(row,col); }
        } else if(piece&&piece.color===currentPlayer){ let moves=getValidMoves(row,col); if(moves.length){ selectedRow=row; selectedCol=col; renderBoard(); } }
    }
    function updateGameStatusMsg(){ const div=document.getElementById('gameStatus'); if(!gameActive){ div.innerHTML='🏁 Game Over'; return; } if(currentPlayer===myColor) div.innerHTML='🎯 YOUR TURN — click your piece then target'; else div.innerHTML=`⏳ Waiting for ${currentPlayer==='red'?'🔴 RED':'⚫ BLACK'} ...`; }
    function showResult(win,amount){ const modal=document.getElementById('resultModal'); const cont=document.getElementById('resultContent'); cont.innerHTML=win?`<div class="result-win">🏆 WINNER 🏆</div><div>+${amount} VEVO</div>`:`<div class="result-loss">💀 DEFEAT 💀</div><div>Better luck next time</div>`; modal.style.display='block'; setTimeout(()=>modal.style.display='none',3500);}
    function addChatMessage(sender,msg,system){ const chatDiv=document.getElementById('chatMessages'); const d=document.createElement('div'); d.className=system?'message system':(sender===currentUser?.uid?'message sent':'message received'); d.innerHTML=system?`<div>${msg}</div>`:(sender===currentUser?.uid?`<div>${msg}</div>`:`<div class="sender">${sender}</div><div>${msg}</div>`); chatDiv.appendChild(d); chatDiv.scrollTop=chatDiv.scrollHeight; }
    async function sendMessage(){ const inp=document.getElementById('chatInput'); const txt=inp.value.trim(); if(!txt||!currentGameId)return; await db.ref(`damaGames/${currentGameId}/chat`).push({senderId:currentUser.uid,senderName:currentUser.displayName||'user',message:txt,timestamp:Date.now()}); addChatMessage(currentUser.uid,txt,false); inp.value=''; }
    function toggleVoiceChat(){ const btn=document.getElementById('voiceChatBtn'); if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; btn.classList.remove('active'); btn.innerHTML='<i class="fas fa-microphone"></i>'; showNotification("Voice off",'info'); } else{ navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{ localStream=stream; btn.classList.add('active'); btn.innerHTML='<i class="fas fa-microphone-slash"></i>'; showNotification("Voice active! (WebRTC ready)",'success'); }).catch(e=>showNotification("Mic error","error")); } }
    async function createGame(){ if(!currentUser)return; let bet=parseInt(document.getElementById('challengeBet').value); if(bet<10||bet>userBalance){ showNotification(`Invalid bet / balance: ${userBalance} VEVO`,'error'); return; } const gid=Date.now().toString(); initBoard(); const game={id:gid,redPlayerId:currentUser.uid,redPlayerName:currentUser.displayName||currentUser.email.split('@')[0],blackPlayerId:null,blackPlayerName:'Waiting...',betAmount:bet,totalPot:bet*2,winnerPayout:Math.floor(bet*2*0.8),houseFee:Math.floor(bet*2*0.2),status:'waiting',boardState:board,currentPlayer:'red',redPieces:12,blackPieces:12,createdAt:Date.now()}; await db.ref(`damaGames/${gid}`).set(game); showNotification("Game created! Waiting for opponent...",'success'); waitingForOpponent=true; db.ref(`damaGames/${gid}`).on('value',async (snap)=>{ const g=snap.val(); if(g&&g.blackPlayerId&&g.status==='waiting'){ db.ref(`damaGames/${gid}`).off(); startCountdown(gid,()=>{ db.ref(`damaGames/${gid}`).update({status:'active'}); joinGame(gid); }); } }); }
    async function autoMatch(){ let bet=parseInt(document.getElementById('challengeBet').value); if(bet<10){ showNotification("Min bet 10",'error'); return; } showNotification("Searching...",'info'); const snap=await db.ref('damaGames').orderByChild('status').equalTo('waiting').once('value'); let found=null; if(snap.val()) for(let [id,g] of Object.entries(snap.val())) if(g.redPlayerId!==currentUser.uid && !g.blackPlayerId && g.betAmount===bet){ found=id; break; } if(found){ await db.ref(`damaGames/${found}`).update({blackPlayerId:currentUser.uid,blackPlayerName:currentUser.displayName||currentUser.email.split('@')[0]}); startCountdown(found,()=>{ db.ref(`damaGames/${found}`).update({status:'active'}); joinGame(found); }); } else await createGame(); }
    async function joinGame(gid){ const snap=await db.ref(`damaGames/${gid}`).once('value'); const game=snap.val(); if(!game) return; currentGameId=gid; myColor=game.redPlayerId===currentUser.uid?'red':'black'; if(game.blackPlayerId===currentUser.uid && !game.betDeducted){ await updateUserBalance(userBalance-game.betAmount); await db.ref(`damaGames/${gid}`).update({betDeducted:true}); } else if(game.redPlayerId===currentUser.uid && game.blackPlayerId && !game.betDeducted){ await updateUserBalance(userBalance-game.betAmount); await db.ref(`damaGames/${gid}`).update({betDeducted:true}); } board=game.boardState||board; currentPlayer=game.currentPlayer; redPieces=game.redPieces; blackPieces=game.blackPieces; gameActive=true; renderBoard(); updateGameStatusMsg(); if(gameListener) gameListener.off(); gameListener=db.ref(`damaGames/${gid}`).on('value',(snapshot)=>{ let upd=snapshot.val(); if(upd&&upd.status==='active'){ if(upd.boardState){ board=upd.boardState; currentPlayer=upd.currentPlayer; redPieces=upd.redPieces; blackPieces=upd.blackPieces; renderBoard(); updateGameStatusMsg(); } } else if(upd?.status==='completed'){ gameActive=false; updateGameStatusMsg(); } }); if(chatListener) chatListener.off(); chatListener=db.ref(`damaGames/${gid}/chat`).on('child_added',(snap)=>{ let msg=snap.val(); if(msg.senderId!==currentUser?.uid) addChatMessage(msg.senderName,msg.message,false); }); document.getElementById('redPlayerName').innerHTML=`👤 ${game.redPlayerName}`; document.getElementById('blackPlayerName').innerHTML=`👤 ${game.blackPlayerName||'Waiting...'}`; addChatMessage('System',`⚔️ Game started! You are ${myColor==='red'?'RED (first)':'BLACK'}`,true); }
    function startCountdown(gid,cb){ let count=3; const ov=document.createElement('div'); ov.className='countdown-overlay'; ov.innerHTML=`<div class="countdown-number" id="cdNum">3</div><div>Match starting...</div>`; document.body.appendChild(ov); let iv=setInterval(()=>{ count--; const nd=document.getElementById('cdNum'); if(nd) nd.innerText=count; if(count<=0){ clearInterval(iv); ov.remove(); cb(); } },1000); }
    function loadOnlinePlayers(){ if(onlineListener) onlineListener.off(); onlineListener=db.ref('onlineUsers').on('value',(snap)=>{ const users=snap.val()||{}; const listDiv=document.getElementById('onlinePlayersList'); const filtered=Object.values(users).filter(u=>u.uid!==currentUser?.uid); if(!filtered.length){ listDiv.innerHTML='<div class="empty-state">✨ No one online</div>'; } else{ listDiv.innerHTML=filtered.map(u=>`<div class="online-player" style="display:flex; justify-content:space-between; background:#1e293b; margin:6px 0; padding:8px 12px; border-radius:60px;"><div><span class="player-status" style="background:#2ecc71; display:inline-block; width:8px; height:8px; border-radius:50%;"></span> <strong>${u.name}</strong> (${u.balance||100} VEVO)</div><button class="challenge-btn-small" style="background:#f39c12; border:none; border-radius:30px; padding:4px 12px;" onclick="window.challengePlayer('${u.uid}','${u.name}')">Challenge</button></div>`).join(''); } document.getElementById('onlineCount').innerText=Object.keys(users).length; }); }
    window.challengePlayer=async function(pid,pname){ let bet=parseInt(document.getElementById('challengeBet').value); if(bet<10){ showNotification("Min bet 10",'error'); return; } const gid=Date.now().toString(); initBoard(); const game={id:gid,redPlayerId:currentUser.uid,redPlayerName:currentUser.displayName||currentUser.email.split('@')[0],blackPlayerId:pid,blackPlayerName:pname,betAmount:bet,totalPot:bet*2,winnerPayout:Math.floor(bet*2*0.8),status:'waiting',boardState:board,currentPlayer:'red',redPieces:12,blackPieces:12}; await db.ref(`damaGames/${gid}`).set(game); showNotification(`Challenge sent to ${pname}!`,'success'); db.ref(`damaGames/${gid}`).on('value',(snap)=>{ if(snap.val()?.status==='active'){ db.ref(`damaGames/${gid}`).off(); startCountdown(gid,()=>joinGame(gid)); } }); };
    window.surrenderGame=async function(){ if(!gameActive||!currentGameId)return; if(confirm("Surrender and lose bet?")){ await endGame(currentPlayer==='red'?'black':'red'); } };
    auth.onAuthStateChanged(async(user)=>{ if(user){ currentUser=user; await loadUserData(); setUserOnline(); loadOnlinePlayers(); initBoard(); renderBoard(); } else window.location.href='index.html'; });
    window.sendMessage=sendMessage; window.toggleVoiceChat=toggleVoiceChat; window.autoMatch=autoMatch; window.createGame=createGame; window.joinGame=joinGame; window.surrenderGame=surrenderGame; window.challengePlayer=window.challengePlayer;
    setInterval(()=>{ if(currentUser) setUserOnline(); },8000);
</script>
