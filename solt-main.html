<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEVOBet - Slot Mania</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .game-logo i {
            margin-right: 10px;
            color: #ffd700;
        }

        .game-balance {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .game-balance i {
            color: #ffd700;
            margin-right: 8px;
        }

        /* Game Title */
        .game-title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .game-title h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .game-title p {
            font-size: 18px;
            opacity: 0.9;
        }

        /* Slot Machine */
        .slot-machine {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffd700;
        }

        .reels-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .reel {
            background: white;
            width: 150px;
            height: 150px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            overflow: hidden;
            position: relative;
        }

        .reel.spinning {
            animation: spinReel 0.2s linear infinite;
        }

        @keyframes spinReel {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }

        .reel-content {
            font-size: 80px;
            text-align: center;
            line-height: 150px;
        }

        .reel-label {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        /* Paylines */
        .paylines {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
        }

        .payline {
            text-align: center;
            color: white;
        }

        .payline-name {
            font-size: 14px;
            opacity: 0.8;
        }

        .payline-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        /* Spin Button */
        .spin-section {
            text-align: center;
            margin: 20px 0;
        }

        .spin-button {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            padding: 15px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .spin-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Jackpot Display */
        .jackpot {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .jackpot-title {
            font-size: 18px;
            color: #2c3e50;
            font-weight: bold;
        }

        .jackpot-amount {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Bet Controls */
        .bet-controls {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }

        .bet-controls label {
            font-size: 18px;
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .bet-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bet-adjust {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        #betAmount {
            width: 120px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-weight: bold;
        }

        .quick-bets {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .quick-bet {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Result Display */
        .result-display {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .result-message {
            font-size: 28px;
            font-weight: bold;
        }

        .result-win {
            color: #48bb78;
        }

        .result-jackpot {
            color: #ffd700;
            animation: pulse 0.5s ease-in-out;
        }

        .result-loss {
            color: #ff4757;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* History */
        .history-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .history-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-item.win {
            background: rgba(72, 187, 120, 0.1);
            border-left: 4px solid #48bb78;
        }

        .history-item.jackpot {
            background: rgba(255, 215, 0, 0.2);
            border-left: 4px solid #ffd700;
        }

        .history-item.loss {
            border-left: 4px solid #ff4757;
        }

        .no-history {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .reel {
                width: 100px;
                height: 100px;
            }
            .reel-content {
                font-size: 50px;
                line-height: 100px;
            }
            .game-title h1 {
                font-size: 32px;
            }
            .spin-button {
                padding: 12px 40px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="game-logo">
                <i class="fas fa-dice-d6"></i> VEVOBet
            </div>
            <div class="game-balance">
                <i class="fas fa-coins"></i> <span id="gameBalance">0</span> VEVO
            </div>
        </div>

        <div class="game-title">
            <h1><i class="fas fa-slot-machine"></i> Slot Mania <i class="fas fa-gem"></i></h1>
            <p>Match 3 symbols to win! Land 3 SEVENS for the JACKPOT!</p>
        </div>

        <div class="slot-machine">
            <div class="reels-container">
                <div class="reel" id="reel1">
                    <div class="reel-content" id="reel1Content">🎰</div>
                </div>
                <div class="reel" id="reel2">
                    <div class="reel-content" id="reel2Content">🎰</div>
                </div>
                <div class="reel" id="reel3">
                    <div class="reel-content" id="reel3Content">🎰</div>
                </div>
            </div>

            <div class="paylines">
                <div class="payline">
                    <div class="payline-name">🍒 CHERRY</div>
                    <div class="payline-value">5x</div>
                </div>
                <div class="payline">
                    <div class="payline-name">🍊 ORANGE</div>
                    <div class="payline-value">10x</div>
                </div>
                <div class="payline">
                    <div class="payline-name">🍋 LEMON</div>
                    <div class="payline-value">15x</div>
                </div>
                <div class="payline">
                    <div class="payline-name">🍇 GRAPE</div>
                    <div class="payline-value">20x</div>
                </div>
                <div class="payline">
                    <div class="payline-name">🔔 BELL</div>
                    <div class="payline-value">25x</div>
                </div>
                <div class="payline">
                    <div class="payline-name">⭐ STAR</div>
                    <div class="payline-value">30x</div>
                </div>
                <div class="payline">
                    <div class="payline-name">7️⃣ SEVEN</div>
                    <div class="payline-value">50x</div>
                </div>
            </div>

            <div class="jackpot">
                <div class="jackpot-title">🎰 MEGA JACKPOT 🎰</div>
                <div class="jackpot-amount" id="jackpotAmount">10,000</div>
                <div class="jackpot-title">3x SEVENS = JACKPOT!</div>
            </div>

            <div class="spin-section">
                <button class="spin-button" id="spinBtn">SPIN!</button>
            </div>
        </div>

        <div class="bet-controls">
            <label>Bet Amount (VEVO):</label>
            <div class="bet-input-group">
                <button class="bet-adjust" data-change="-10">-10</button>
                <input type="number" id="betAmount" value="10" min="1" step="1">
                <button class="bet-adjust" data-change="10">+10</button>
            </div>
            <div class="quick-bets">
                <button class="quick-bet" data-value="10">10</button>
                <button class="quick-bet" data-value="50">50</button>
                <button class="quick-bet" data-value="100">100</button>
                <button class="quick-bet" data-value="500">500</button>
            </div>
        </div>

        <div class="result-display" id="resultDisplay" style="display: none;">
            <div class="result-message" id="resultMessage"></div>
        </div>

        <div class="history-section">
            <h3><i class="fas fa-history"></i> Recent Spins</h3>
            <div id="gameHistory" class="history-list">
                <p class="no-history">No spins yet. Start playing!</p>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/a2e0a8c9d2.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // Slot Symbols
        const symbols = [
            { icon: '🍒', name: 'CHERRY', multiplier: 5 },
            { icon: '🍊', name: 'ORANGE', multiplier: 10 },
            { icon: '🍋', name: 'LEMON', multiplier: 15 },
            { icon: '🍇', name: 'GRAPE', multiplier: 20 },
            { icon: '🔔', name: 'BELL', multiplier: 25 },
            { icon: '⭐', name: 'STAR', multiplier: 30 },
            { icon: '7️⃣', name: 'SEVEN', multiplier: 50 }
        ];
        
        let currentUser = null;
        let userBalance = 0;
        let isSpinning = false;
        let jackpotAmount = 10000;
        let spinHistory = [];
        
        function updateBalanceDisplay() {
            document.getElementById('gameBalance').textContent = userBalance;
        }
        
        async function loadUserBalance() {
            if (!currentUser) return;
            const userRef = db.ref(`users/${currentUser.uid}`);
            const snapshot = await userRef.once('value');
            const userData = snapshot.val();
            if (userData) {
                userBalance = userData.balance || 0;
                updateBalanceDisplay();
                spinHistory = userData.slotHistory || [];
                updateHistoryDisplay();
                if (userData.jackpotContribution) {
                    jackpotAmount += userData.jackpotContribution;
                }
                document.getElementById('jackpotAmount').textContent = jackpotAmount.toLocaleString();
            }
        }
        
        async function updateUserBalance(newBalance) {
            if (!currentUser) return;
            await db.ref(`users/${currentUser.uid}`).update({ balance: newBalance });
            userBalance = newBalance;
            updateBalanceDisplay();
        }
        
        async function updateJackpot(amount) {
            if (!currentUser) return;
            await db.ref(`users/${currentUser.uid}`).update({ jackpotContribution: amount });
            jackpotAmount = amount;
            document.getElementById('jackpotAmount').textContent = jackpotAmount.toLocaleString();
        }
        
        async function saveHistory(spinResult, winAmount) {
            if (!currentUser) return;
            spinHistory.unshift({ result: spinResult, win: winAmount, time: Date.now() });
            if (spinHistory.length > 20) spinHistory.pop();
            await db.ref(`users/${currentUser.uid}`).update({ slotHistory: spinHistory });
            updateHistoryDisplay();
        }
        
        async function addGameHistory(symbols, winAmount, multiplier) {
            if (!currentUser) return;
            const historyRef = db.ref(`users/${currentUser.uid}/gameHistory/slotMania`);
            const newEntry = {
                symbols: symbols.join(' '),
                multiplier: multiplier,
                winAmount: winAmount,
                timestamp: Date.now()
            };
            await historyRef.push(newEntry);
        }
        
        function updateHistoryDisplay() {
            const historyDiv = document.getElementById('gameHistory');
            if (!spinHistory || spinHistory.length === 0) {
                historyDiv.innerHTML = '<p class="no-history">No spins yet. Start playing!</p>';
                return;
            }
            historyDiv.innerHTML = spinHistory.slice(0, 10).map(item => `
                <div class="history-item ${item.win > 0 ? (item.win >= 5000 ? 'jackpot' : 'win') : 'loss'}">
                    <span>${item.result}</span>
                    <span class="${item.win > 0 ? 'win' : 'loss'}">
                        ${item.win > 0 ? '+' : ''}${item.win} VEVO
                    </span>
                </div>
            `).join('');
        }
        
        function getRandomSymbol() {
            const random = Math.random();
            // Weighted probabilities for better gameplay
            if (random < 0.25) return symbols[0]; // Cherry (common)
            if (random < 0.45) return symbols[1]; // Orange
            if (random < 0.60) return symbols[2]; // Lemon
            if (random < 0.73) return symbols[3]; // Grape
            if (random < 0.84) return symbols[4]; // Bell
            if (random < 0.94) return symbols[5]; // Star
            return symbols[6]; // Seven (rare)
        }
        
        function animateReel(reelElement, contentElement, finalSymbol, duration, callback) {
            const startTime = Date.now();
            const interval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                if (elapsed >= duration) {
                    clearInterval(interval);
                    contentElement.textContent = finalSymbol.icon;
                    reelElement.classList.remove('spinning');
                    callback();
                } else {
                    const randomSymbol = getRandomSymbol();
                    contentElement.textContent = randomSymbol.icon;
                }
            }, 50);
            reelElement.classList.add('spinning');
        }
        
        async function spin() {
            if (isSpinning) {
                alert('Spin in progress!');
                return;
            }
            
            if (!currentUser) {
                alert('Please login first!');
                window.location.href = 'index.html';
                return;
            }
            
            const betAmount = parseInt(document.getElementById('betAmount').value);
            if (isNaN(betAmount) || betAmount < 1) {
                alert('Please enter a valid bet amount!');
                return;
            }
            
            if (betAmount > userBalance) {
                alert(`Insufficient balance! You have ${userBalance} VEVO`);
                return;
            }
            
            isSpinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            
            // Deduct bet
            await updateUserBalance(userBalance - betAmount);
            
            // Generate final symbols
            const finalSymbols = [
                getRandomSymbol(),
                getRandomSymbol(),
                getRandomSymbol()
            ];
            
            // Animate each reel
            const reel1 = document.getElementById('reel1');
            const reel2 = document.getElementById('reel2');
            const reel3 = document.getElementById('reel3');
            const content1 = document.getElementById('reel1Content');
            const content2 = document.getElementById('reel2Content');
            const content3 = document.getElementById('reel3Content');
            
            let completed = 0;
            let winAmount = 0;
            let multiplier = 0;
            let isJackpot = false;
            
            function checkWin() {
                if (finalSymbols[0].name === finalSymbols[1].name && finalSymbols[1].name === finalSymbols[2].name) {
                    multiplier = finalSymbols[0].multiplier;
                    
                    // Jackpot special: 3 Sevens gives bonus jackpot
                    if (finalSymbols[0].name === 'SEVEN') {
                        winAmount = betAmount * multiplier + jackpotAmount;
                        isJackpot = true;
                        await updateJackpot(10000); // Reset jackpot
                    } else {
                        winAmount = betAmount * multiplier;
                        // Add 1% of bet to jackpot
                        const jackpotContribution = Math.floor(betAmount * 0.01);
                        jackpotAmount += jackpotContribution;
                        await updateJackpot(jackpotAmount);
                    }
                } else {
                    winAmount = 0;
                    // Add 1% of bet to jackpot even on loss
                    const jackpotContribution = Math.floor(betAmount * 0.01);
                    jackpotAmount += jackpotContribution;
                    await updateJackpot(jackpotAmount);
                }
            }
            
            function onReelComplete() {
                completed++;
                if (completed === 3) {
                    // All reels done, calculate win
                    if (finalSymbols[0].name === finalSymbols[1].name && finalSymbols[1].name === finalSymbols[2].name) {
                        multiplier = finalSymbols[0].multiplier;
                        
                        if (finalSymbols[0].name === 'SEVEN') {
                            winAmount = betAmount * multiplier + jackpotAmount;
                            isJackpot = true;
                            updateJackpot(10000);
                        } else {
                            winAmount = betAmount * multiplier;
                            const jackpotContribution = Math.floor(betAmount * 0.01);
                            jackpotAmount += jackpotContribution;
                            updateJackpot(jackpotAmount);
                        }
                    } else {
                        winAmount = 0;
                        const jackpotContribution = Math.floor(betAmount * 0.01);
                        jackpotAmount += jackpotContribution;
                        updateJackpot(jackpotAmount);
                    }
                    
                    if (winAmount > 0) {
                        updateUserBalance(userBalance + winAmount);
                    }
                    
                    const spinResult = `${finalSymbols[0].icon} ${finalSymbols[1].icon} ${finalSymbols[2].icon}`;
                    saveHistory(spinResult, winAmount);
                    addGameHistory(finalSymbols.map(s => s.icon), winAmount, multiplier);
                    
                    let message = '';
                    if (isJackpot) {
                        message = `🎰🎉 JACKPOT! 🎉🎰\n${finalSymbols[0].icon} ${finalSymbols[1].icon} ${finalSymbols[2].icon}\nYou won ${winAmount.toLocaleString()} VEVO! Congratulations! 🎉`;
                        document.getElementById('resultMessage').className = 'result-message result-jackpot';
                    } else if (winAmount > 0) {
                        message = `🎉 WIN! ${finalSymbols[0].icon} ${finalSymbols[1].icon} ${finalSymbols[2].icon}\nYou won ${winAmount} VEVO! (${multiplier}x) 🎉`;
                        document.getElementById('resultMessage').className = 'result-message result-win';
                    } else {
                        message = `😢 LOSS! ${finalSymbols[0].icon} ${finalSymbols[1].icon} ${finalSymbols[2].icon}\nYou lost ${betAmount} VEVO. Better luck next time!`;
                        document.getElementById('resultMessage').className = 'result-message result-loss';
                    }
                    
                    document.getElementById('resultDisplay').style.display = 'block';
                    document.getElementById('resultMessage').textContent = message;
                    
                    setTimeout(() => {
                        document.getElementById('resultDisplay').style.display = 'none';
                    }, 4000);
                    
                    isSpinning = false;
                    spinBtn.disabled = false;
                }
            }
            
            // Start animations
            animateReel(reel1, content1, finalSymbols[0], 800, onReelComplete);
            animateReel(reel2, content2, finalSymbols[1], 1000, onReelComplete);
            animateReel(reel3, content3, finalSymbols[2], 1200, onReelComplete);
        }
        
        // Event Listeners
        document.getElementById('spinBtn').addEventListener('click', spin);
        
        document.querySelectorAll('.bet-adjust').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const change = parseInt(btn.dataset.change);
                const input = document.getElementById('betAmount');
                let newVal = parseInt(input.value) + change;
                if (newVal < 1) newVal = 1;
                input.value = newVal;
            });
        });
        
        document.querySelectorAll('.quick-bet').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.getElementById('betAmount').value = btn.dataset.value;
            });
        });
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const userRef = db.ref(`users/${user.uid}`);
                const snapshot = await userRef.once('value');
                if (!snapshot.exists()) {
                    await userRef.set({
                        email: user.email,
                        name: user.displayName || user.email.split('@')[0],
                        balance: 100,
                        withdrawCode: null,
                        inviteCount: 0,
                        inviteRewards: 0,
                        slotHistory: [],
                        jackpotContribution: 0,
                        createdAt: Date.now()
                    });
                }
                await loadUserBalance();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
