<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEVOBet - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* App Container */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .logo-area {
            padding: 25px 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        .logo-area i {
            color: #ffd700;
            margin-right: 10px;
        }

        .nav-menu {
            flex: 1;
            padding: 0 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-item i {
            width: 24px;
            font-size: 18px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            font-weight: bold;
        }

        .user-info-sidebar {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .user-avatar {
            font-size: 40px;
            color: #ffd700;
        }

        .user-details-side {
            flex: 1;
        }

        .user-details-side span {
            display: block;
        }

        .user-details-side span:first-child {
            font-weight: bold;
            font-size: 14px;
        }

        .user-details-side span:last-child {
            font-size: 11px;
            opacity: 0.7;
        }

        .logout-btn {
            background: rgba(255, 71, 87, 0.8);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ff4757;
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px;
            min-height: 100vh;
        }

        /* Dashboard Header */
        .dashboard-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .profile-name-email {
            text-align: right;
        }

        .profile-name-email span {
            color: white;
            font-weight: bold;
            display: block;
        }

        .profile-name-email small {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
        }

        .balance-box {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 8px 20px;
            border-radius: 25px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 20px;
        }

        .balance-box i {
            margin-right: 8px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .stat-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        /* Zero Balance Banner */
        .zero-balance-banner {
            background: linear-gradient(135deg, #ffd70020, #ff8c0020);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            border: 2px solid #ffd700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
        }

        .zero-balance-banner i {
            font-size: 50px;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .zero-balance-banner h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .zero-balance-banner p {
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
        }

        .deposit-btn-large {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
        }

        .deposit-btn-large:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .action-card {
            flex: 1;
            min-width: 180px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            text-decoration: none;
            display: block;
        }

        .action-card:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
            border-color: #ffd700;
        }

        .action-card i {
            font-size: 40px;
            color: #ffd700;
            margin-bottom: 12px;
        }

        .action-card h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .action-card p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        /* Games Grid */
        .section-title {
            color: white;
            margin: 30px 0 20px 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2);
        }

        .game-card-image {
            height: 160px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .game-card-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .game-card:hover .game-card-image::after {
            background: rgba(0,0,0,0.4);
        }

        .game-card-info {
            padding: 20px;
        }

        .game-card-info h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #333;
        }

        .game-card-info p {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .play-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-block;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn-disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Referral Banner */
        .referral-banner {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .referral-content h3 {
            color: white;
            margin-bottom: 5px;
        }

        .referral-content p {
            color: rgba(255,255,255,0.8);
        }

        .referral-code {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
            color: #ffd700;
            margin-top: 10px;
        }

        .invite-btn {
            background: #ffd700;
            color: #1a1a2e;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .invite-btn:hover {
            transform: scale(1.05);
            background: #ffed4e;
        }

        /* Menu Toggle */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
            background: #ffd700;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding-top: 60px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .games-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <i class="fas fa-dice-d6"></i>
                <span>VEVOBet</span>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="games.html" class="nav-item" data-page="games">
                    <i class="fas fa-gamepad"></i> Games
                </a>
                <a href="deposit-withdraw.html" class="nav-item">
                    <i class="fas fa-exchange-alt"></i> Deposit/Withdraw
                </a>
                <a href="refferal.html" class="nav-item">
                    <i class="fas fa-users"></i> Referral
                </a>
                <a href="settings.html" class="nav-item" data-page="settings">

                </a>

            <div class="user-info-sidebar">
                <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="user-details-side">
                    <span id="sidebarUserName">Guest</span>
                    <span id="sidebarUserEmail">Not logged in</span>
                </div>
                <button id="logoutBtnSidebar" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dashboard-header">
                <div class="header-title">
                    <h1>Welcome to VEVOBet</h1>
                </div>
                <div class="user-profile-header">
                    <div class="profile-name-email">
                        <span id="headerUserName">User Name</span>
                        <small id="headerUserEmail">user@example.com</small>
                    </div>
                    <div class="balance-box">
                        <i class="fas fa-coins"></i>
                        <span id="userBalance">0</span> VEVO
                    </div>
                </div>
            </header>

            <div id="pageContent">
                <!-- Dashboard Content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);">
        <div class="modal-content" style="background: white; margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;">
            <span class="close-modal" onclick="closeModal()" style="float: right; font-size: 28px; cursor: pointer;">&times;</span>
            <h2>Login / Register</h2>
            <form id="authForm">
                <input type="text" id="authName" placeholder="Full Name" required style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
                <input type="email" id="authEmail" placeholder="Email Address" required style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
                <input type="password" id="authPassword" placeholder="Password (min 6 chars)" required style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
                <button type="submit" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Login / Register</button>
                <p class="form-switch" style="text-align: center; margin-top: 15px; font-size: 12px;">New user? Account will be created automatically.</p>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        let currentUser = null;
        let userData = null;
        
        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.style.background = type === 'success' ? '#48bb78' : type === 'error' ? '#ff4757' : '#667eea';
            n.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('open'); 
        }
        
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        function updateUserUI() {
            if (currentUser && userData) {
                document.getElementById('headerUserName').textContent = userData.name || currentUser.displayName || 'User';
                document.getElementById('headerUserEmail').textContent = currentUser.email;
                document.getElementById('sidebarUserName').textContent = userData.name || currentUser.displayName || 'User';
                document.getElementById('sidebarUserEmail').textContent = currentUser.email;
                document.getElementById('userBalance').textContent = userData.balance || 0;
            }
        }
        
        async function loadUserData() {
            if (!currentUser) return;
            const s = await db.ref(`users/${currentUser.uid}`).once('value');
            if (s.exists()) {
                userData = s.val();
            } else {
                userData = { 
                    email: currentUser.email, 
                    name: currentUser.displayName || currentUser.email.split('@')[0], 
                    balance: 100,
                    withdrawCode: null, 
                    inviteCount: 0, 
                    inviteRewards: 0, 
                    invitees: [],
                    createdAt: Date.now()
                };
                await db.ref(`users/${currentUser.uid}`).set(userData);
            }
            updateUserUI();
        }
        
        function generatePromoCode(uid) { 
            return uid ? uid.substring(0, 8).toUpperCase() : ''; 
        }
        
        function renderDashboard() {
            const promo = generatePromoCode(currentUser?.uid);
            const userBalance = userData?.balance || 0;
            const hasBalance = userBalance > 0;
            
            let html = `

                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>Friends Invited</h3><div class="stat-number">${userData?.inviteCount || 0}</div></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-gift"></i></div><div class="stat-info"><h3>Invite Rewards</h3><div class="stat-number">${userData?.inviteRewards || 0} VEVO</div></div></div>
                </div>

            if (!hasBalance) {
                html += `
                    <div class="zero-balance-banner">

                        <h3>💰 Your Balance is 0 VEVO</h3>

                        <a href="deposit-withdraw.html" class="deposit-btn-large"><i class="fas fa-money-bill-wave"></i> Deposit Now</a>
                    </div>
                `;
            }
            
            html += `
                <div class="action-buttons">
                    <a href="deposit-withdraw.html" class="action-card"><i class="fas fa-money-bill-wave"></i><h3>Deposit</h3><p>Add funds to your account</p></a>
                    <a href="deposit-withdraw.html" class="action-card"><i class="fas fa-hand-holding-usd"></i><h3>Withdraw</h3><p>Cash out your winnings</p></a>
                    <a href="refferal.html" class="action-card"><i class="fas fa-user-plus"></i><h3>Invite Friends</h3><p>Earn 10 VEVO per 5 invites</p></a>
                </div>
                
                <h2 class="section-title"><i class="fas fa-gamepad"></i> Popular Games</h2>
                <div class="games-grid">
                    <a href="dama-game.html" class="game-card">
                        <div class="game-card-image"><i class="fas fa-chess-board"></i></div>
                        <div class="game-card-info"><h3>🎲 Dama - Ethiopian Checkers</h3><p>Traditional 8x8 checkers! Challenge players 1v1!</p><button class="play-btn">Play Now →</button></div>
                    </a>
                    <a href="duel-arena.html" class="game-card">
                        <div class="game-card-image"><i class="fas fa-swords"></i></div>
                        <div class="game-card-info"><h3>⚔️ Duel Arena</h3><p>Multiplayer 1v1 dice battle! Winner takes 80%!</p><button class="play-btn">Play Now →</button></div>
                    </a>
                    <a href="game1.html" class="game-card">
                        <div class="game-card-image"><i class="fas fa-sync-alt"></i></div>
                        <div class="game-card-info"><h3>🎡 Lucky Spin</h3><p>Spin the wheel and win up to 10x your bet!</p><button class="play-btn">Play Now →</button></div>
                    </a>
                    <a href="Dice-dual.html" class="game-card">
                        <div class="game-card-image"><i class="fas fa-dice"></i></div>
                        <div class="game-card-info"><h3>🎲 Dice Duel</h3><p>Predict over or under 50 for 1.95x payout!</p><button class="play-btn">Play Now →</button></div>
                    </a>
                    <a href="Coin-clash.html" class="game-card">
                        <div class="game-card-image"><i class="fas fa-coins"></i></div>
                        <div class="game-card-info"><h3>🪙 Coin Clash</h3><p>Heads or tails? Build your win streak!</p><button class="play-btn">Play Now →</button></div>
                    </a>
                    <a href="Number-ninja.html" class="game-card">
                        <div class="game-card-image"><i class="fas fa-calculator"></i></div>
                        <div class="game-card-info"><h3>🔢 Number Ninja</h3><p>Guess the number, closer = higher multiplier!</p><button class="play-btn">Play Now →</button></div>
                    </a>
                    <a href="Card-clash.html" class="game-card">

                        <div class="game-card-image"><i class="fas fa-slot-machine"></i></div>

            return html;
        }
        
        async function handleAuth(email, password, name) {
            try {
                let cred = await auth.signInWithEmailAndPassword(email, password);
                currentUser = cred.user;
                await loadUserData();
                closeModal();
                renderDashboardContent();
                showNotification('Welcome back!', 'success');
            } catch (err) {
                if (err.code === 'auth/user-not-found') {
                    let cred = await auth.createUserWithEmailAndPassword(email, password);
                    await cred.user.updateProfile({ displayName: name });
                    currentUser = cred.user;
                    await loadUserData();
                    closeModal();
                    renderDashboardContent();
                    showNotification('Account created! You have 100 VEVO!', 'success');
                } else showNotification(err.message, 'error');
            }
        }
        
        function renderDashboardContent() {
            if (!currentUser) {
                document.getElementById('pageContent').innerHTML = `
                    <div style="text-align:center;padding:60px; background: rgba(255,255,255,0.1); border-radius: 20px;">
                        <i class="fas fa-user-lock" style="font-size:80px;color:white"></i>
                        <h2 style="color:white; margin-top:20px;">Please Login</h2>
                        <p style="color:white; margin:20px 0;">Login or register to start playing and winning!</p>
                        <button onclick="document.getElementById('loginModal').style.display='block'" style="background:#ffd700;padding:12px 30px;border:none;border-radius:25px; font-weight:bold; cursor:pointer;">Login / Register</button>
                    </div>
                `;
                return;
            }
            document.getElementById('pageContent').innerHTML = renderDashboard();
        }
        
        document.getElementById('authForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleAuth(
                document.getElementById('authEmail').value, 
                document.getElementById('authPassword').value, 
                document.getElementById('authName').value
            );
        });
        
        document.getElementById('logoutBtnSidebar')?.addEventListener('click', async () => { 
            await auth.signOut(); 
            currentUser = null; 
            userData = null; 
            renderDashboardContent();
            showNotification('Logged out', 'info'); 
        });
        
        window.onclick = (e) => { 
            if (e.target.classList.contains('modal')) closeModal(); 
        };
        
        auth.onAuthStateChanged(async (user) => {
            if (user) { 
                currentUser = user; 
                await loadUserData(); 
            } else { 
                currentUser = null; 
                userData = null; 
            }
            renderDashboardContent();
        });
        
        window.toggleSidebar = toggleSidebar;
        window.closeModal = closeModal;
    </script>
