<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEVOBet - Lucky Spin | Spin to Win Multipliers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e1a3a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Premium Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            transform: translateX(-3px);
        }

        .game-logo {
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0,0,0,0.2);
        }

        .game-logo i {
            color: #FFD966;
            margin-right: 8px;
        }

        .game-balance {
            background: linear-gradient(95deg, #00000066, #2d2a5e);
            padding: 8px 24px;
            border-radius: 50px;
            color: #FFE484;
            font-size: 22px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.4);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .game-balance i {
            color: #FFD966;
            margin-right: 8px;
        }

        /* Title */
        .game-title {
            text-align: center;
            margin-bottom: 35px;
        }

        .game-title h1 {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #FFE6A3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
            letter-spacing: -0.5px;
        }

        .game-title p {
            font-size: 18px;
            color: #CBC3E3;
            font-weight: 500;
        }

        /* Wheel Container */
        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .wheel-container {
            position: relative;
            width: 520px;
            height: 520px;
            margin: 0 auto;
        }

        #wheelCanvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 12px rgba(255,215,0,0.2);
            transition: box-shadow 0.2s;
        }

        .pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 58px;
            color: #FFD966;
            filter: drop-shadow(0 8px 12px black);
            z-index: 15;
            text-shadow: 0 0 5px #ffb347;
        }

        .spin-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle at 30% 10%, #ff4d4d, #b91c1c);
            color: white;
            border: none;
            padding: 16px 44px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 0 #6b1a1a, 0 12px 25px black;
            z-index: 20;
            font-family: inherit;
        }

        .spin-button:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 4px 0 #6b1a1a;
        }

        .spin-button:disabled {
            opacity: 0.65;
            transform: translateX(-50%);
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        /* Betting Panel Premium */
        .betting-section {
            background: rgba(22, 26, 45, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            padding: 28px 30px;
            margin: 25px 0 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 35px -10px black;
        }

        .bet-controls label {
            font-size: 20px;
            font-weight: 700;
            color: #FFE6C7;
            margin-bottom: 12px;
            display: block;
        }

        .bet-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin: 15px 0;
        }

        .bet-adjust {
            background: #2d3e6e;
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 6px black;
        }

        .bet-adjust:active {
            transform: scale(0.96);
        }

        #betAmount {
            width: 170px;
            padding: 14px;
            font-size: 28px;
            text-align: center;
            font-weight: 800;
            background: #0f0f1c;
            border: 2px solid #ffcd7e;
            border-radius: 60px;
            color: #ffd966;
            font-family: monospace;
        }

        .quick-bets {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .quick-bet {
            background: linear-gradient(145deg, #2c3e66, #1a263f);
            color: #FFE6B3;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 6px black;
        }

        .quick-bet:active {
            background: #ffae42;
            color: #1e1a2f;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 2px dashed rgba(255, 215, 0, 0.4);
            gap: 20px;
        }

        .last-result, .win-multiplier {
            background: rgba(0,0,0,0.45);
            border-radius: 32px;
            padding: 12px 18px;
            flex: 1;
        }

        .last-result h4, .win-multiplier h4 {
            color: #ffdb8e;
            font-size: 18px;
            letter-spacing: 1px;
        }

        #lastResult {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFB347, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .multipliers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .multipliers span {
            background: linear-gradient(145deg, #2b2b4f, #171c38);
            color: #FFE2A4;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid rgba(255,215,0,0.4);
        }

        /* History */
        .history-section {
            background: rgba(10, 12, 28, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 38px;
            padding: 20px 24px;
            margin-top: 15px;
            border: 1px solid rgba(255, 200, 100, 0.3);
        }

        .history-section h3 {
            color: #FFD966;
            font-size: 22px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-list {
            max-height: 240px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            border-left: 6px solid #FFB347;
            font-weight: 500;
        }

        .history-item.win {
            border-left-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
        }

        .history-item.loss {
            border-left-color: #e74c3c;
        }

        .history-result.win {
            color: #2ecc71;
            font-weight: bold;
        }

        .history-result.loss {
            color: #e74c3c;
        }

        .no-history {
            text-align: center;
            color: #aaa9c2;
            padding: 28px;
            font-style: italic;
        }

        @keyframes wheelSpinPop {
            0% { filter: drop-shadow(0 0 0px gold);}
            100% { filter: drop-shadow(0 0 15px gold);}
        }

        .wheel-spinning {
            animation: wheelSpinPop 0.4s infinite alternate;
        }

        @media (max-width: 680px) {
            .wheel-container {
                width: 320px;
                height: 320px;
            }
            .spin-button {
                padding: 10px 28px;
                font-size: 20px;
                bottom: 12px;
            }
            .game-title h1 { font-size: 36px; }
            .bet-adjust { width: 44px; height: 44px; font-size: 24px; }
            #betAmount { width: 120px; font-size: 22px; }
            .pointer { font-size: 40px; top: -22px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <a href="#" class="back-btn" id="homeRedirectBtn"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <div class="game-logo">
            <i class="fas fa-crown"></i> VEVO Bet
        </div>
        <div class="game-balance">
            <i class="fas fa-coins"></i> <span id="gameBalance">0</span> VEVO
        </div>
    </div>

    <div class="game-title">
        <h1><i class="fas fa-sync-alt"></i> LUCKY SPIN</h1>
        <p>⚡ Spin the wheel — win up to 10x multiplier! ⚡</p>
    </div>

    <div class="wheel-wrapper">
        <div class="wheel-container">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="pointer"><i class="fas fa-caret-down"></i></div>
            <button class="spin-button" id="spinBtn">SPIN!</button>
        </div>
    </div>

    <div class="betting-section">
        <div class="bet-controls">
            <label>💰 BET AMOUNT (VEVO)</label>
            <div class="bet-input-group">
                <button class="bet-adjust" data-change="-25">-25</button>
                <input type="number" id="betAmount" value="25" min="1" step="1">
                <button class="bet-adjust" data-change="25">+25</button>
            </div>
            <div class="quick-bets">
                <button class="quick-bet" data-value="10">10</button>
                <button class="quick-bet" data-value="50">50</button>
                <button class="quick-bet" data-value="100">100</button>
                <button class="quick-bet" data-value="250">250</button>
                <button class="quick-bet" data-value="1000">1000</button>
            </div>
        </div>
        <div class="game-info">
            <div class="last-result">
                <h4>🎲 LAST RESULT</h4>
                <p id="lastResult">—</p>
            </div>
            <div class="win-multiplier">
                <h4>⭐ MULTIPLIERS ⭐</h4>
                <div class="multipliers">
                    <span>0.5x</span> <span>1x</span> <span>2x</span> <span>3x</span>
                    <span>4x</span> <span>5x</span> <span>10x</span> <span>0x</span>
                </div>
            </div>
        </div>
    </div>

    <div class="history-section">
        <h3><i class="fas fa-history"></i> Recent Spins</h3>
        <div id="gameHistory" class="history-list">
            <p class="no-history">✨ No spins yet. Spin the wheel! ✨</p>
        </div>
    </div>
</div>

<script src="https://kit.fontawesome.com/a2e0a8c9d2.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    // Firebase Config (same as original, fully functional)
    const firebaseConfig = {
        apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
        authDomain: "newporoject-c6f66.firebaseapp.com",
        databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
        projectId: "newporoject-c6f66",
        storageBucket: "newporoject-c6f66.appspot.com",
        messagingSenderId: "733557611631",
        appId: "1:733557611631:web:02c9377f56d614ff3b019a",
        measurementId: "G-53BEVW33FP"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // ----- GAME SEGMENTS (with updated attractive multipliers) -----
    const segments = [
        { value: 2, color: '#E65C4F', label: '2x' },      // vibrant red
        { value: 1, color: '#47B5FF', label: '1x' },      // electric blue
        { value: 5, color: '#FFC857', label: '5x' },      // gold
        { value: 0.5, color: '#80B192', label: '0.5x' },  // soft green
        { value: 3, color: '#9B6B9E', label: '3x' },      // purple
        { value: 10, color: '#E8934B', label: '10x' },     // orange burst
        { value: 0, color: '#BB2E3E', label: '0x' },       // dark red
        { value: 4, color: '#48A9A6', label: '4x' }        // teal
    ];
    
    let currentRotation = 0;       // rad
    let isSpinning = false;
    let currentUser = null;
    let userBalance = 0;
    
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width;
    let height = canvas.height;
    
    // High-quality wheel drawing with smooth text
    function drawWheel(rotationRad) {
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = width / 2;
        const angleStep = (Math.PI * 2) / segments.length;
        
        ctx.clearRect(0, 0, width, height);
        ctx.shadowBlur = 0;
        
        for (let i = 0; i < segments.length; i++) {
            const startAngle = i * angleStep + rotationRad;
            const endAngle = (i + 1) * angleStep + rotationRad;
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.fillStyle = segments[i].color;
            ctx.fill();
            ctx.strokeStyle = '#FFF9E8';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.lineTo(centerX, centerY);
            ctx.stroke();
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + angleStep / 2);
            ctx.textAlign = "center";
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "bold 20px 'Segoe UI', 'Poppins'";
            ctx.shadowBlur = 2;
            ctx.shadowColor = "black";
            ctx.fillText(segments[i].label, radius * 0.72, 10);
            ctx.restore();
        }
        
        // center circle
        ctx.beginPath();
        ctx.arc(centerX, centerY, 22, 0, Math.PI * 2);
        ctx.fillStyle = '#FFD966';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
        ctx.fillStyle = '#2D1B2E';
        ctx.fill();
        ctx.strokeStyle = '#ffb347';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    
    // get winner segment based on current rotation (pointer at angle -90°)
    function getWinner(rotationRad) {
        const angleStep = (Math.PI * 2) / segments.length;
        const pointerAngle = Math.PI * 1.5;   // 270° pointing exactly up
        let rawAngle = (pointerAngle - rotationRad) % (Math.PI * 2);
        if (rawAngle < 0) rawAngle += Math.PI * 2;
        const index = Math.floor(rawAngle / angleStep) % segments.length;
        return segments[index];
    }
    
    function updateBalanceDisplay() {
        document.getElementById('gameBalance').innerText = Math.floor(userBalance);
    }
    
    async function loadUserBalance() {
        if (!currentUser) return;
        const userRef = db.ref(`users/${currentUser.uid}`);
        const snapshot = await userRef.once('value');
        const userData = snapshot.val();
        if (userData && typeof userData.balance === 'number') {
            userBalance = userData.balance;
        } else if (userData && userData.balance === undefined) {
            userBalance = 100;
            await userRef.update({ balance: 100 });
        } else {
            userBalance = 100;
        }
        updateBalanceDisplay();
    }
    
    async function updateUserBalance(newBalance) {
        if (!currentUser) return false;
        const rounded = Math.floor(newBalance);
        await db.ref(`users/${currentUser.uid}`).update({ balance: rounded });
        userBalance = rounded;
        updateBalanceDisplay();
        return true;
    }
    
    async function addGameHistory(bet, multiplier, winAmount, resultType) {
        if (!currentUser) return;
        const historyRef = db.ref(`users/${currentUser.uid}/gameHistory/luckySpin`);
        const newEntry = {
            bet: bet,
            multiplier: multiplier,
            winAmount: winAmount,
            result: resultType,
            timestamp: Date.now()
        };
        await historyRef.push(newEntry);
        await loadHistory();
    }
    
    async function loadHistory() {
        if (!currentUser) return;
        const historyRef = db.ref(`users/${currentUser.uid}/gameHistory/luckySpin`);
        const snapshot = await historyRef.once('value');
        const history = snapshot.val();
        const historyDiv = document.getElementById('gameHistory');
        
        if (!history || Object.keys(history).length === 0) {
            historyDiv.innerHTML = '<p class="no-history">🎰 No spins yet. Hit SPIN!</p>';
            return;
        }
        
        const historyArray = Object.values(history).reverse().slice(0, 12);
        historyDiv.innerHTML = historyArray.map(item => {
            const winAmountVal = item.winAmount || 0;
            const isWin = winAmountVal > 0;
            const sign = isWin ? '+' : '';
            return `
                <div class="history-item ${isWin ? 'win' : 'loss'}">
                    <span style="font-size:13px;">${new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    <span>🎲 ${item.bet} VEVO</span>
                    <span>⚡ ${item.multiplier}x</span>
                    <span class="history-result ${isWin ? 'win' : 'loss'}">${sign}${winAmountVal} VEVO</span>
                </div>
            `;
        }).join('');
    }
    
    // Core spin logic: fully functional & smooth animation
    async function performSpin() {
        if (isSpinning) {
            alert("⏳ Spin in progress! Please wait.");
            return;
        }
        if (!currentUser) {
            alert("🔐 Please log in to play!");
            window.location.href = 'index.html';
            return;
        }
        
        const betInput = document.getElementById('betAmount');
        let betAmount = parseInt(betInput.value);
        if (isNaN(betAmount) || betAmount < 1) betAmount = 1;
        if (betAmount > 100000) betAmount = 100000;
        betInput.value = betAmount;
        
        if (betAmount > userBalance) {
            alert(`❌ Insufficient balance! You have ${Math.floor(userBalance)} VEVO`);
            return;
        }
        
        isSpinning = true;
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.disabled = true;
        
        // Deduct bet amount instantly
        await updateUserBalance(userBalance - betAmount);
        
        // Generate random spin: between 8 to 16 full rotations + random offset
        const extraRotations = 8 + Math.random() * 10;
        const spinDegrees = 360 * extraRotations + Math.random() * 360;
        const targetRotationRad = currentRotation + (spinDegrees * Math.PI / 180);
        
        const startTime = performance.now();
        const duration = 2800;
        
        function animateSpin(now) {
            const elapsed = now - startTime;
            let progress = Math.min(1, elapsed / duration);
            // cubic ease out
            const easeOut = 1 - Math.pow(1 - progress, 3.2);
            const currentRad = currentRotation + (spinDegrees * Math.PI / 180) * easeOut;
            drawWheel(currentRad % (Math.PI * 2));
            
            if (progress < 1) {
                requestAnimationFrame(animateSpin);
            } else {
                const finalRad = targetRotationRad % (Math.PI * 2);
                currentRotation = finalRad;
                drawWheel(currentRotation);
                
                const winner = getWinner(currentRotation);
                const rawWin = betAmount * winner.value;
                const winAmount = Math.floor(rawWin);
                const winMultiplier = winner.value;
                
                let resultMessage = '';
                let gameResultType = 'loss';
                let finalWin = 0;
                
                if (winAmount > 0) {
                    finalWin = winAmount;
                    resultMessage = `🎉 WON ${winAmount} VEVO! (${winMultiplier}x) 🎉`;
                    gameResultType = 'win';
                    await updateUserBalance(userBalance + winAmount);
                } else {
                    resultMessage = `😞 LOST! Multiplier ${winMultiplier}x — no win.`;
                    gameResultType = 'loss';
                    finalWin = 0;
                }
                
                document.getElementById('lastResult').innerHTML = resultMessage;
                
                // store history
                await addGameHistory(betAmount, winMultiplier, finalWin, gameResultType);
                await loadUserBalance();  // refresh displayed balance
                isSpinning = false;
                spinBtn.disabled = false;
            }
        }
        
        requestAnimationFrame(animateSpin);
    }
    
    // Event listeners for interactive betting
    document.getElementById('spinBtn').addEventListener('click', performSpin);
    
    document.querySelectorAll('.bet-adjust').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const change = parseInt(btn.dataset.change);
            const input = document.getElementById('betAmount');
            let currentVal = parseInt(input.value);
            if (isNaN(currentVal)) currentVal = 25;
            let newVal = currentVal + change;
            if (newVal < 1) newVal = 1;
            if (newVal > 50000) newVal = 50000;
            input.value = newVal;
        });
    });
    
    document.querySelectorAll('.quick-bet').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.getElementById('betAmount').value = btn.dataset.value;
        });
    });
    
    document.getElementById('homeRedirectBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentUser) window.location.href = 'index.html';
        else window.location.href = 'index.html';
    });
    
    // Authentication + initial load
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const userRef = db.ref(`users/${user.uid}`);
            const snapshot = await userRef.once('value');
            if (!snapshot.exists()) {
                await userRef.set({
                    email: user.email,
                    name: user.displayName || user.email?.split('@')[0] || "Player",
                    balance: 250,
                    withdrawCode: null,
                    inviteCount: 0,
                    inviteRewards: 0,
                    createdAt: Date.now()
                });
                userBalance = 250;
            } else {
                const data = snapshot.val();
                if (typeof data.balance !== 'number') userBalance = 250;
                else userBalance = data.balance;
                await userRef.update({ balance: userBalance });
            }
            await loadUserBalance();
            await loadHistory();
            drawWheel(currentRotation);
        } else {
            // not logged in: redirect to main page (index)
            window.location.href = 'index.html';
        }
    });
    
    // resize canvas redraw handler
    function handleCanvasResize() {
        const container = document.querySelector('.wheel-container');
        const size = container.clientWidth;
        canvas.width = size;
        canvas.height = size;
        width = size;
        height = size;
        drawWheel(currentRotation);
    }
    window.addEventListener('resize', () => { handleCanvasResize(); });
    setTimeout(() => { handleCanvasResize(); }, 100);
    handleCanvasResize();
    
    // ensure manual draw after auth
    setTimeout(() => {
        if (currentUser) drawWheel(currentRotation);
    }, 200);
</script>
</body>
</html>
