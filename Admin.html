<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEVOBet - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        /* Login Container */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box h2 { margin-bottom: 10px; color: #333; }
        .login-box .logo { font-size: 48px; color: #667eea; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #ff4757; margin-top: 10px; font-size: 14px; }

        /* Admin Dashboard */
        .admin-container { display: none; min-height: 100vh; }

        /* Sidebar */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .admin-logo { padding: 25px; text-align: center; border-bottom: 2px solid rgba(255, 215, 0, 0.3); }
        .admin-logo i { font-size: 40px; color: #ffd700; }
        .admin-logo h2 { margin-top: 10px; font-size: 20px; }
        .admin-logo p { font-size: 12px; opacity: 0.7; margin-top: 5px; }

        .admin-nav { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-item.active { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; font-weight: bold; }
        .nav-item i { width: 24px; }

        /* Main Content */
        .admin-main { margin-left: 280px; padding: 20px; }
        .admin-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-header h1 { color: white; font-size: 24px; }
        .admin-user { display: flex; align-items: center; gap: 15px; background: rgba(0, 0, 0, 0.3); padding: 8px 20px; border-radius: 50px; }
        .admin-user i { font-size: 24px; color: #ffd700; }
        .logout-admin { background: #ff4757; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .stat-card i { font-size: 32px; color: #667eea; margin-bottom: 8px; }
        .stat-card h3 { font-size: 12px; color: #666; margin-bottom: 5px; }
        .stat-card .number { font-size: 28px; font-weight: bold; color: #333; }

        /* Search Bar */
        .search-bar {
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-bar i { color: #999; font-size: 18px; }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 8px 0;
        }
        .search-bar input::placeholder { color: #ccc; }

        /* User Cards */
        .users-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .user-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }
        .user-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .user-card h4 { color: #333; margin-bottom: 5px; }
        .user-card p { color: #666; font-size: 13px; margin: 3px 0; }
        .user-card .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-top: 8px; }
        .badge-pending { background: #ffd700; color: #333; }
        .badge-approved { background: #48bb78; color: white; }
        .badge-rejected { background: #ff4757; color: white; }

        /* Detail Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            margin: 3% auto;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close-modal:hover { color: #333; }
        .modal-header { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
        .modal-header h3 { color: #333; }
        .detail-row { margin: 15px 0; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .detail-label { font-weight: bold; color: #666; width: 40%; }
        .detail-value { color: #333; width: 55%; word-break: break-all; }
        .screenshot-img { max-width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-approve { flex: 1; background: #48bb78; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-reject { flex: 1; background: #ff4757; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-reset { background: #ffd700; color: #333; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        /* Sections */
        .section-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .admin-tab {
            padding: 10px 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .admin-tab.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        /* Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f5f5f5; font-weight: bold; color: #333; }
        tr:hover { background: #f9f9f9; cursor: pointer; }
        .status-pending { background: #ffd700; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-approved { background: #48bb78; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-rejected { background: #ff4757; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        /* Menu Toggle */
        .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 101; background: #ffd700; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .admin-sidebar { width: 80px; transform: translateX(-100%); position: fixed; z-index: 100; transition: transform 0.3s; }
            .admin-sidebar.open { transform: translateX(0); }
            .admin-main { margin-left: 0; padding-top: 60px; }
            .admin-logo h2, .admin-logo p, .nav-item span { display: none; }
            .nav-item { justify-content: center; }
            .nav-item i { font-size: 22px; margin: 0; }
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .notification { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; color: white; z-index: 2000; animation: slideIn 0.3s ease; }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <div class="logo"><i class="fas fa-dice-d6"></i></div>
            <h2>Admin Login</h2>
            <p>VEVOBet Administration Panel</p>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button onclick="adminLogin()">Login</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-container">
        <div class="admin-sidebar" id="adminSidebar">
            <div class="admin-logo">
                <i class="fas fa-dice-d6"></i>
                <h2>VEVOBet</h2>
                <p>Admin Panel</p>
            </div>
            <div class="admin-nav">
                <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></div>
                <div class="nav-item" data-tab="deposits"><i class="fas fa-money-bill-wave"></i> <span>Deposit Requests</span></div>
                <div class="nav-item" data-tab="withdraws"><i class="fas fa-hand-holding-usd"></i> <span>Withdraw Requests</span></div>
                <div class="nav-item" data-tab="users"><i class="fas fa-users"></i> <span>All Users</span></div>
                <div class="nav-item" data-tab="settings"><i class="fas fa-cog"></i> <span>Settings</span></div>
            </div>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
                <div class="admin-user">
                    <i class="fas fa-user-shield"></i>
                    <span id="adminName">Abel</span>
                    <button class="logout-admin" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            <div id="adminContent"></div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeDetailModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const ADMIN_USERNAME = "abel";
        const ADMIN_PASSWORD = "9679";
        let isLoggedIn = false;
        let currentTab = 'dashboard';
        
        function toggleSidebar() { document.getElementById('adminSidebar').classList.toggle('open'); }
        
        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.style.background = type === 'success' ? '#48bb78' : '#ff4757';
            n.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadAdminContent('dashboard');
            } else {
                document.getElementById('loginError').textContent = 'Invalid username or password';
            }
        }
        
        function adminLogout() {
            isLoggedIn = false;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        }
        
        // Load Dashboard Stats
        async function loadDashboard() {
            const usersSnap = await db.ref('users').once('value');
            const users = usersSnap.val() || {};
            const userCount = Object.keys(users).length;
            
            const depositsSnap = await db.ref('deposits').once('value');
            const deposits = depositsSnap.val() || {};
            const pendingDeposits = Object.values(deposits).filter(d => d.status === 'pending').length;
            const totalDeposits = Object.values(deposits).filter(d => d.status === 'approved').reduce((s, d) => s + (d.vevoAmount || 0), 0);
            
            const withdrawsSnap = await db.ref('withdraws').once('value');
            const withdraws = withdrawsSnap.val() || {};
            const pendingWithdraws = Object.values(withdraws).filter(w => w.status === 'pending').length;
            const totalWithdraws = Object.values(withdraws).filter(w => w.status === 'approved').reduce((s, w) => s + (w.amount || 0), 0);
            
            let totalBalance = 0;
            Object.values(users).forEach(u => totalBalance += u.balance || 0);
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-users"></i><h3>Total Users</h3><div class="number">${userCount}</div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><h3>Pending Deposits</h3><div class="number">${pendingDeposits}</div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><h3>Pending Withdraws</h3><div class="number">${pendingWithdraws}</div></div>
                    <div class="stat-card"><i class="fas fa-check-circle"></i><h3>Approved Deposits</h3><div class="number">${totalDeposits.toLocaleString()} VEVO</div></div>
                    <div class="stat-card"><i class="fas fa-hand-holding-usd"></i><h3>Approved Withdraws</h3><div class="number">${totalWithdraws.toLocaleString()} VEVO</div></div>
                    <div class="stat-card"><i class="fas fa-coins"></i><h3>Total VEVO Circulation</h3><div class="number">${totalBalance.toLocaleString()}</div></div>
                </div>
                <div class="section-card">
                    <h2 class="section-title"><i class="fas fa-bell"></i> Pending Requests</h2>
                    <div class="admin-tabs">
                        <button class="admin-tab active" onclick="loadDeposits()">Deposits (${pendingDeposits})</button>
                        <button class="admin-tab" onclick="loadWithdraws()">Withdrawals (${pendingWithdraws})</button>
                    </div>
                </div>
            `;
            document.getElementById('adminContent').innerHTML = html;
        }
        
        // Load Deposit Requests (Pending first, newest first)
        async function loadDeposits() {
            const snapshot = await db.ref('deposits').once('value');
            const deposits = snapshot.val() || {};
            const depositsArray = Object.values(deposits).sort((a, b) => b.createdAt - a.createdAt);
            
            const pending = depositsArray.filter(d => d.status === 'pending');
            const approved = depositsArray.filter(d => d.status === 'approved');
            const rejected = depositsArray.filter(d => d.status === 'rejected');
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-clock"></i><h3>Pending</h3><div class="number">${pending.length}</div></div>
                    <div class="stat-card"><i class="fas fa-check-circle"></i><h3>Approved</h3><div class="number">${approved.length}</div></div>
                    <div class="stat-card"><i class="fas fa-times-circle"></i><h3>Rejected</h3><div class="number">${rejected.length}</div></div>
                </div>
                <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="depositSearch" placeholder="Search by email or name..." onkeyup="filterDeposits()"></div>
                <div class="users-list" id="depositsList">
            `;
            
            depositsArray.forEach(deposit => {
                const statusClass = deposit.status === 'pending' ? 'badge-pending' : (deposit.status === 'approved' ? 'badge-approved' : 'badge-rejected');
                const statusText = deposit.status.toUpperCase();
                html += `
                    <div class="user-card" data-email="${(deposit.userEmail || '').toLowerCase()}" data-name="${(deposit.userName || '').toLowerCase()}" onclick="showDepositDetail('${deposit.id}')">
                        <h4>${deposit.userName || deposit.userEmail}</h4>
                        <p><i class="fas fa-envelope"></i> ${deposit.userEmail}</p>
                        <p><i class="fas fa-money-bill-wave"></i> ${deposit.amount} ${deposit.currency || 'BIRR'} → ${deposit.vevoAmount} VEVO</p>
                        <p><i class="fas fa-calendar"></i> ${new Date(deposit.createdAt).toLocaleString()}</p>
                        <span class="badge ${statusClass}">${statusText}</span>
                    </div>
                `;
            });
            
            if (depositsArray.length === 0) html += '<div class="section-card"><p style="text-align:center">No deposit requests found</p></div>';
            html += '</div>';
            document.getElementById('adminContent').innerHTML = html;
        }
        
        // Load Withdraw Requests (Pending first, newest first)
        async function loadWithdraws() {
            const snapshot = await db.ref('withdraws').once('value');
            const withdraws = snapshot.val() || {};
            const withdrawsArray = Object.values(withdraws).sort((a, b) => b.createdAt - a.createdAt);
            
            const pending = withdrawsArray.filter(w => w.status === 'pending');
            const approved = withdrawsArray.filter(w => w.status === 'approved');
            const rejected = withdrawsArray.filter(w => w.status === 'rejected');
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-clock"></i><h3>Pending</h3><div class="number">${pending.length}</div></div>
                    <div class="stat-card"><i class="fas fa-check-circle"></i><h3>Approved</h3><div class="number">${approved.length}</div></div>
                    <div class="stat-card"><i class="fas fa-times-circle"></i><h3>Rejected</h3><div class="number">${rejected.length}</div></div>
                </div>
                <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="withdrawSearch" placeholder="Search by email or name..." onkeyup="filterWithdraws()"></div>
                <div class="users-list" id="withdrawsList">
            `;
            
            withdrawsArray.forEach(withdraw => {
                const statusClass = withdraw.status === 'pending' ? 'badge-pending' : (withdraw.status === 'approved' ? 'badge-approved' : 'badge-rejected');
                const statusText = withdraw.status.toUpperCase();
                html += `
                    <div class="user-card" data-email="${(withdraw.userEmail || '').toLowerCase()}" data-name="${(withdraw.userName || '').toLowerCase()}" onclick="showWithdrawDetail('${withdraw.id}')">
                        <h4>${withdraw.userName || withdraw.userEmail}</h4>
                        <p><i class="fas fa-envelope"></i> ${withdraw.userEmail}</p>
                        <p><i class="fas fa-hand-holding-usd"></i> ${withdraw.amount} VEVO</p>
                        <p><i class="fas fa-university"></i> ${withdraw.methodName || withdraw.method} → ${withdraw.account}</p>
                        <p><i class="fas fa-calendar"></i> ${new Date(withdraw.createdAt).toLocaleString()}</p>
                        <span class="badge ${statusClass}">${statusText}</span>
                    </div>
                `;
            });
            
            if (withdrawsArray.length === 0) html += '<div class="section-card"><p style="text-align:center">No withdrawal requests found</p></div>';
            html += '</div>';
            document.getElementById('adminContent').innerHTML = html;
        }
        
        // Load All Users (newest first)
        async function loadUsers() {
            const snapshot = await db.ref('users').once('value');
            const users = snapshot.val() || {};
            const usersArray = Object.entries(users).map(([uid, user]) => ({ ...user, uid, createdAt: user.createdAt || 0 })).sort((a, b) => b.createdAt - a.createdAt);
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-users"></i><h3>Total Users</h3><div class="number">${usersArray.length}</div></div>
                    <div class="stat-card"><i class="fas fa-coins"></i><h3>Total Balance</h3><div class="number">${usersArray.reduce((s, u) => s + (u.balance || 0), 0).toLocaleString()} VEVO</div></div>
                </div>
                <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="userSearch" placeholder="Search by email or name..." onkeyup="filterUsers()"></div>
                <div class="users-list" id="usersList">
            `;
            
            usersArray.forEach(user => {
                html += `
                    <div class="user-card" data-email="${(user.email || '').toLowerCase()}" data-name="${(user.name || '').toLowerCase()}" onclick="showUserDetail('${user.uid}')">
                        <h4>${user.name || user.email}</h4>
                        <p><i class="fas fa-envelope"></i> ${user.email}</p>
                        <p><i class="fas fa-coins"></i> ${user.balance || 0} VEVO</p>
                        <p><i class="fas fa-user-friends"></i> Invited: ${user.inviteCount || 0} | Rewards: ${user.inviteRewards || 0}</p>
                        <p><i class="fas fa-calendar"></i> Joined: ${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A'}</p>
                        <span class="badge ${user.withdrawCode ? 'badge-approved' : 'badge-pending'}">${user.withdrawCode ? '✓ Code Set' : '⚠ No Code'}</span>
                    </div>
                `;
            });
            
            if (usersArray.length === 0) html += '<div class="section-card"><p style="text-align:center">No users found</p></div>';
            html += '</div>';
            document.getElementById('adminContent').innerHTML = html;
        }
        
        // Show Deposit Detail Modal
        async function showDepositDetail(depositId) {
            const snapshot = await db.ref(`deposits/${depositId}`).once('value');
            const deposit = snapshot.val();
            if (!deposit) return;
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-money-bill-wave"></i> Deposit Request Details</h3></div>
                <div class="detail-row"><div class="detail-label">User Name:</div><div class="detail-value">${deposit.userName || '-'}</div></div>
                <div class="detail-row"><div class="detail-label">Email:</div><div class="detail-value">${deposit.userEmail}</div></div>
                <div class="detail-row"><div class="detail-label">Amount:</div><div class="detail-value">${deposit.amount} ${deposit.currency || 'BIRR'}</div></div>
                <div class="detail-row"><div class="detail-label">VEVO Amount:</div><div class="detail-value">${deposit.vevoAmount} VEVO</div></div>
                <div class="detail-row"><div class="detail-label">Payment Method:</div><div class="detail-value">${deposit.methodDetails || deposit.method || 'Bank Transfer'}</div></div>
                <div class="detail-row"><div class="detail-label">Status:</div><div class="detail-value"><span class="${deposit.status === 'pending' ? 'status-pending' : (deposit.status === 'approved' ? 'status-approved' : 'status-rejected')}">${deposit.status.toUpperCase()}</span></div></div>
                <div class="detail-row"><div class="detail-label">Date:</div><div class="detail-value">${new Date(deposit.createdAt).toLocaleString()}</div></div>
                <div class="detail-row"><div class="detail-label">Screenshot:</div><div class="detail-value"><img src="${deposit.screenshot}" class="screenshot-img" onclick="window.open(this.src)"></div></div>
                ${deposit.status === 'pending' ? `
                    <div class="action-buttons">
                        <button class="btn-approve" onclick="approveDepositAction('${deposit.id}', ${deposit.vevoAmount}, '${deposit.userId}')"><i class="fas fa-check"></i> Approve</button>
                        <button class="btn-reject" onclick="rejectDepositAction('${deposit.id}')"><i class="fas fa-times"></i> Reject</button>
                    </div>
                ` : ''}
            `;
            document.getElementById('detailModal').style.display = 'block';
        }
        
        // Show Withdraw Detail Modal
        async function showWithdrawDetail(withdrawId) {
            const snapshot = await db.ref(`withdraws/${withdrawId}`).once('value');
            const withdraw = snapshot.val();
            if (!withdraw) return;
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-hand-holding-usd"></i> Withdrawal Request Details</h3></div>
                <div class="detail-row"><div class="detail-label">User Name:</div><div class="detail-value">${withdraw.userName || '-'}</div></div>
                <div class="detail-row"><div class="detail-label">Email:</div><div class="detail-value">${withdraw.userEmail}</div></div>
                <div class="detail-row"><div class="detail-label">Amount:</div><div class="detail-value">${withdraw.amount} VEVO</div></div>
                <div class="detail-row"><div class="detail-label">Withdrawal Method:</div><div class="detail-value">${withdraw.methodName || withdraw.method}</div></div>
                <div class="detail-row"><div class="detail-label">Account Number:</div><div class="detail-value">${withdraw.account}</div></div>
                <div class="detail-row"><div class="detail-label">Status:</div><div class="detail-value"><span class="${withdraw.status === 'pending' ? 'status-pending' : (withdraw.status === 'approved' ? 'status-approved' : 'status-rejected')}">${withdraw.status.toUpperCase()}</span></div></div>
                <div class="detail-row"><div class="detail-label">Date:</div><div class="detail-value">${new Date(withdraw.createdAt).toLocaleString()}</div></div>
                ${withdraw.status === 'pending' ? `
                    <div class="action-buttons">
                        <button class="btn-approve" onclick="approveWithdrawAction('${withdraw.id}', ${withdraw.amount}, '${withdraw.userId}')"><i class="fas fa-check"></i> Approve</button>
                        <button class="btn-reject" onclick="rejectWithdrawAction('${withdraw.id}')"><i class="fas fa-times"></i> Reject</button>
                    </div>
                ` : ''}
            `;
            document.getElementById('detailModal').style.display = 'block';
        }
        
        // Show User Detail Modal
        async function showUserDetail(userId) {
            const snapshot = await db.ref(`users/${userId}`).once('value');
            const user = snapshot.val();
            if (!user) return;
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-user"></i> User Details</h3></div>
                <div class="detail-row"><div class="detail-label">Name:</div><div class="detail-value">${user.name || '-'}</div></div>
                <div class="detail-row"><div class="detail-label">Email:</div><div class="detail-value">${user.email}</div></div>
                <div class="detail-row"><div class="detail-label">Balance:</div><div class="detail-value"><strong>${user.balance || 0} VEVO</strong></div></div>
                <div class="detail-row"><div class="detail-label">Withdrawal Code:</div><div class="detail-value">${user.withdrawCode ? '✓ Set' : '❌ Not set'}</div></div>
                <div class="detail-row"><div class="detail-label">Invited Friends:</div><div class="detail-value">${user.inviteCount || 0}</div></div>
                <div class="detail-row"><div class="detail-label">Rewards Earned:</div><div class="detail-value">${user.inviteRewards || 0} VEVO</div></div>
                <div class="detail-row"><div class="detail-label">Joined:</div><div class="detail-value">${user.createdAt ? new Date(user.createdAt).toLocaleString() : 'N/A'}</div></div>
                <div class="action-buttons">
                    <button class="btn-reset" onclick="resetUserCode('${userId}')"><i class="fas fa-key"></i> Reset Withdraw Code</button>
                    <button class="btn-approve" onclick="openAddBalanceModal('${userId}', '${user.name || user.email}', ${user.balance || 0})"><i class="fas fa-plus"></i> Add Balance</button>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'block';
        }
        
        // Approve Deposit Action
        async function approveDepositAction(depositId, vevoAmount, userId) {
            if (confirm(`Approve deposit? User will receive ${vevoAmount} VEVO.`)) {
                await db.ref(`deposits/${depositId}`).update({ status: 'approved', approvedAt: Date.now() });
                const userRef = db.ref(`users/${userId}`);
                const userSnap = await userRef.once('value');
                const user = userSnap.val();
                await userRef.update({ balance: (user.balance || 0) + vevoAmount });
                showNotification(`Deposit approved! +${vevoAmount} VEVO`, 'success');
                closeDetailModal();
                loadDeposits();
            }
        }
        
        // Reject Deposit Action
        async function rejectDepositAction(depositId) {
            if (confirm('Reject this deposit?')) {
                await db.ref(`deposits/${depositId}`).update({ status: 'rejected', rejectedAt: Date.now() });
                showNotification('Deposit rejected', 'success');
                closeDetailModal();
                loadDeposits();
            }
        }
        
        // Approve Withdraw Action
        async function approveWithdrawAction(withdrawId, amount, userId) {
            if (confirm(`Approve withdrawal? ${amount} VEVO will be deducted from user balance.`)) {
                await db.ref(`withdraws/${withdrawId}`).update({ status: 'approved', approvedAt: Date.now() });
                const userRef = db.ref(`users/${userId}`);
                const userSnap = await userRef.once('value');
                const user = userSnap.val();
                await userRef.update({ balance: (user.balance || 0) - amount });
                showNotification(`Withdrawal approved! -${amount} VEVO`, 'success');
                closeDetailModal();
                loadWithdraws();
            }
        }
        
        // Reject Withdraw Action
        async function rejectWithdrawAction(withdrawId) {
            if (confirm('Reject this withdrawal?')) {
                await db.ref(`withdraws/${withdrawId}`).update({ status: 'rejected', rejectedAt: Date.now() });
                showNotification('Withdrawal rejected', 'success');
                closeDetailModal();
                loadWithdraws();
            }
        }
        
        // Reset User Code
        async function resetUserCode(userId) {
            if (confirm('Reset withdrawal code for this user?')) {
                await db.ref(`users/${userId}`).update({ withdrawCode: null });
                showNotification('Withdrawal code reset', 'success');
                closeDetailModal();
                loadUsers();
            }
        }
        
        // Add Balance Modal
        function openAddBalanceModal(userId, userName, currentBalance) {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-plus-circle"></i> Add Balance</h3></div>
                <div class="detail-row"><div class="detail-label">User:</div><div class="detail-value">${userName}</div></div>
                <div class="detail-row"><div class="detail-label">Current Balance:</div><div class="detail-value">${currentBalance} VEVO</div></div>
                <div class="detail-row"><div class="detail-label">Amount to Add:</div><div class="detail-value"><input type="number" id="addAmount" style="padding:8px; width:100%; border:1px solid #ddd; border-radius:5px;" placeholder="Enter amount"></div></div>
                <div class="action-buttons">
                    <button class="btn-approve" onclick="confirmAddBalance('${userId}', ${currentBalance})"><i class="fas fa-check"></i> Add Balance</button>
                    <button class="btn-reject" onclick="closeDetailModal()"><i class="fas fa-times"></i> Cancel</button>
                </div>
            `;
        }
        
        async function confirmAddBalance(userId, currentBalance) {
            const amount = parseInt(document.getElementById('addAmount').value);
            if (!amount || amount <= 0) {
                showNotification('Enter valid amount', 'error');
                return;
            }
            await db.ref(`users/${userId}`).update({ balance: currentBalance + amount });
            showNotification(`Added ${amount} VEVO!`, 'success');
            closeDetailModal();
            loadUsers();
        }
        
        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
        }
        
        // Filter functions
        function filterDeposits() {
            const search = document.getElementById('depositSearch')?.value.toLowerCase() || '';
            const cards = document.querySelectorAll('#depositsList .user-card');
            cards.forEach(card => {
                const email = card.dataset.email || '';
                const name = card.dataset.name || '';
                card.style.display = (email.includes(search) || name.includes(search)) ? 'block' : 'none';
            });
        }
        
        function filterWithdraws() {
            const search = document.getElementById('withdrawSearch')?.value.toLowerCase() || '';
            const cards = document.querySelectorAll('#withdrawsList .user-card');
            cards.forEach(card => {
                const email = card.dataset.email || '';
                const name = card.dataset.name || '';
                card.style.display = (email.includes(search) || name.includes(search)) ? 'block' : 'none';
            });
        }
        
        function filterUsers() {
            const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
            const cards = document.querySelectorAll('#usersList .user-card');
            cards.forEach(card => {
                const email = card.dataset.email || '';
                const name = card.dataset.name || '';
                card.style.display = (email.includes(search) || name.includes(search)) ? 'block' : 'none';
            });
        }
        
        function loadSettings() {
            const html = `
                <div class="section-card">
                    <h2 class="section-title"><i class="fas fa-cog"></i> Admin Settings</h2>
                    <div style="padding: 20px;">
                        <h3>System Information</h3>
                        <p><strong>Admin:</strong> Abel</p>
                        <p><strong>Exchange Rate:</strong> 1 Birr = 1 VEVO | 1 USDT = 157 VEVO</p>
                        <p><strong>Referral Reward:</strong> 10 VEVO for every 5 invites</p>
                        <hr style="margin: 20px 0;">
                        <h3>Payment Details</h3>
                        <p><strong>M-Pesa:</strong> 0725032395 (Abenezer Shigute)</p>
                        <p><strong>TeleBirr:</strong> 0940980555 (Tenaye Hutalo)</p>
                        <p><strong>CBE Birr:</strong> 0940980555</p>
                        <p><strong>CBE Bank:</strong> 1000612391754</p>
                        <p><strong>TRC20:</strong> TWym3qg8TUNTyutMxvPpnatjeWs8C7jsLY</p>
                    </div>
                </div>
            `;
            document.getElementById('adminContent').innerHTML = html;
        }
        
        async function loadAdminContent(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.dataset.tab === tab) item.classList.add('active');
                else item.classList.remove('active');
            });
            if (tab === 'dashboard') await loadDashboard();
            else if (tab === 'deposits') await loadDeposits();
            else if (tab === 'withdraws') await loadWithdraws();
            else if (tab === 'users') await loadUsers();
            else if (tab === 'settings') loadSettings();
        }
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => loadAdminContent(item.dataset.tab));
        });
        
        window.onclick = (e) => {
            const modal = document.getElementById('detailModal');
            if (e.target === modal) closeDetailModal();
        };
        
        window.showDepositDetail = showDepositDetail;
        window.showWithdrawDetail = showWithdrawDetail;
        window.showUserDetail = showUserDetail;
        window.approveDepositAction = approveDepositAction;
        window.rejectDepositAction = rejectDepositAction;
        window.approveWithdrawAction = approveWithdrawAction;
        window.rejectWithdrawAction = rejectWithdrawAction;
        window.resetUserCode = resetUserCode;
        window.openAddBalanceModal = openAddBalanceModal;
        window.confirmAddBalance = confirmAddBalance;
        window.filterDeposits = filterDeposits;
        window.filterWithdraws = filterWithdraws;
        window.filterUsers = filterUsers;
        window.closeDetailModal = closeDetailModal;
        window.loadDeposits = loadDeposits;
        window.loadWithdraws = loadWithdraws;
        window.loadUsers = loadUsers;
    </script>
</body>
</html>
