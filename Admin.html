<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEVOBet - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        /* Login Container */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-box .logo {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: scale(1.02);
        }

        .error-msg {
            color: #ff4757;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Admin Dashboard */
        .admin-container {
            display: none;
            min-height: 100vh;
        }

        /* Sidebar */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .admin-logo {
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        .admin-logo i {
            font-size: 40px;
            color: #ffd700;
        }

        .admin-logo h2 {
            margin-top: 10px;
            font-size: 20px;
        }

        .admin-logo p {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .admin-nav {
            padding: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            font-weight: bold;
        }

        .nav-item i {
            width: 24px;
        }

        /* Main Content */
        .admin-main {
            margin-left: 280px;
            padding: 20px;
        }

        .admin-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            color: white;
            font-size: 24px;
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .admin-user i {
            font-size: 24px;
            color: #ffd700;
        }

        .logout-admin {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-admin:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-card i {
            font-size: 40px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        /* Tables */
        .section-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-pending {
            background: #ffd700;
            color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-approved {
            background: #48bb78;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-rejected {
            background: #ff4757;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-approve {
            background: #48bb78;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-reject {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-reset {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .screenshot-link {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content img {
            max-width: 100%;
            border-radius: 8px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                width: 80px;
                transform: translateX(-100%);
                position: fixed;
                z-index: 100;
            }
            .admin-sidebar.open {
                transform: translateX(0);
            }
            .admin-main {
                margin-left: 0;
            }
            .admin-logo h2, .admin-logo p, .nav-item span {
                display: none;
            }
            .nav-item {
                justify-content: center;
            }
            .nav-item i {
                font-size: 22px;
                margin: 0;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 101;
                background: #ffd700;
                border: none;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
            }
        }

        .menu-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-dice-d6"></i>
            </div>
            <h2>Admin Login</h2>
            <p>VEVOBet Administration Panel</p>
            <input type="text" id="adminUsername" placeholder="Username" autocomplete="off">
            <input type="password" id="adminPassword" placeholder="Password">
            <button onclick="adminLogin()">Login</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-container">
        <div class="admin-sidebar" id="adminSidebar">
            <div class="admin-logo">
                <i class="fas fa-dice-d6"></i>
                <h2>VEVOBet</h2>
                <p>Admin Panel</p>
            </div>
            <div class="admin-nav">
                <div class="nav-item active" data-tab="dashboard">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </div>
                <div class="nav-item" data-tab="deposits">
                    <i class="fas fa-money-bill-wave"></i> <span>Deposit Requests</span>
                </div>
                <div class="nav-item" data-tab="withdraws">
                    <i class="fas fa-hand-holding-usd"></i> <span>Withdraw Requests</span>
                </div>
                <div class="nav-item" data-tab="users">
                    <i class="fas fa-users"></i> <span>Users Management</span>
                </div>
                <div class="nav-item" data-tab="settings">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </div>
            </div>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
                <div class="admin-user">
                    <i class="fas fa-user-shield"></i>
                    <span id="adminName">Abel</span>
                    <button class="logout-admin" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>

            <div id="adminContent">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Screenshot Modal -->
    <div id="screenshotModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeScreenshotModal()">&times;</span>
            <h3>Payment Screenshot</h3>
            <img id="screenshotImage" src="" alt="Screenshot">
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Admin credentials
        const ADMIN_USERNAME = "abel";
        const ADMIN_PASSWORD = "9679";
        
        let isLoggedIn = false;
        let currentTab = 'dashboard';
        
        // Login function
        function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadAdminContent('dashboard');
                loadStats();
            } else {
                document.getElementById('loginError').textContent = 'Invalid username or password';
            }
        }
        
        function adminLogout() {
            isLoggedIn = false;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').textContent = '';
        }
        
        // Load stats
        async function loadStats() {
            try {
                // Get all users
                const usersSnapshot = await db.ref('users').once('value');
                const users = usersSnapshot.val() || {};
                const userCount = Object.keys(users).length;
                
                // Get pending deposits
                const depositsSnapshot = await db.ref('deposits').once('value');
                const deposits = depositsSnapshot.val() || {};
                const pendingDeposits = Object.values(deposits).filter(d => d.status === 'pending').length;
                
                // Get pending withdraws
                const withdrawsSnapshot = await db.ref('withdraws').once('value');
                const withdraws = withdrawsSnapshot.val() || {};
                const pendingWithdraws = Object.values(withdraws).filter(w => w.status === 'pending').length;
                
                // Calculate total balance
                let totalBalance = 0;
                Object.values(users).forEach(user => {
                    totalBalance += user.balance || 0;
                });
                
                document.getElementById('statUserCount').textContent = userCount;
                document.getElementById('statPendingDeposits').textContent = pendingDeposits;
                document.getElementById('statPendingWithdraws').textContent = pendingWithdraws;
                document.getElementById('statTotalBalance').textContent = totalBalance.toLocaleString();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Load deposits
        async function loadDeposits() {
            try {
                const snapshot = await db.ref('deposits').once('value');
                const deposits = snapshot.val() || {};
                const depositsArray = Object.values(deposits).sort((a, b) => b.createdAt - a.createdAt);
                
                let html = `
                    <div class="section-card">
                        <h2 class="section-title"><i class="fas fa-money-bill-wave"></i> Deposit Requests</h2>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>ID</th><th>User</th><th>Amount</th><th>VEVO</th><th>Status</th><th>Date</th><th>Screenshot</th><th>Actions</th></tr>
                                </thead>
                                <tbody>
                `;
                
                depositsArray.forEach(deposit => {
                    const date = new Date(deposit.createdAt).toLocaleString();
                    const statusClass = deposit.status === 'pending' ? 'status-pending' : (deposit.status === 'approved' ? 'status-approved' : 'status-rejected');
                    
                    html += `
                        <tr>
                            <td>${deposit.id}</td>
                            <td>${deposit.userName || deposit.userEmail}<br><small>${deposit.userEmail}</small></td>
                            <td>${deposit.amount} ${deposit.currency}</td>
                            <td>${deposit.vevoAmount}</td>
                            <td><span class="${statusClass}">${deposit.status.toUpperCase()}</span></td>
                            <td>${date}</td>
                            <td><a class="screenshot-link" onclick="viewScreenshot('${deposit.screenshot}')">View</a></td>
                            <td>
                                ${deposit.status === 'pending' ? `
                                    <button class="btn-approve" onclick="approveDeposit('${deposit.id}', ${deposit.vevoAmount}, '${deposit.userId}')">Approve</button>
                                    <button class="btn-reject" onclick="rejectDeposit('${deposit.id}')">Reject</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                });
                
                if (depositsArray.length === 0) {
                    html += '<tr><td colspan="8" style="text-align: center;">No deposit requests found</td></tr>';
                }
                
                html += '</tbody></table></div></div>';
                document.getElementById('adminContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading deposits:', error);
                document.getElementById('adminContent').innerHTML = '<div class="section-card"><p>Error loading deposits</p></div>';
            }
        }
        
        // Load withdraws
        async function loadWithdraws() {
            try {
                const snapshot = await db.ref('withdraws').once('value');
                const withdraws = snapshot.val() || {};
                const withdrawsArray = Object.values(withdraws).sort((a, b) => b.createdAt - a.createdAt);
                
                let html = `
                    <div class="section-card">
                        <h2 class="section-title"><i class="fas fa-hand-holding-usd"></i> Withdrawal Requests</h2>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>ID</th><th>User</th><th>Amount (VEVO)</th><th>Method</th><th>Account</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                                </thead>
                                <tbody>
                `;
                
                withdrawsArray.forEach(withdraw => {
                    const date = new Date(withdraw.createdAt).toLocaleString();
                    const statusClass = withdraw.status === 'pending' ? 'status-pending' : (withdraw.status === 'approved' ? 'status-approved' : 'status-rejected');
                    
                    html += `
                        <tr>
                            <td>${withdraw.id}</td>
                            <td>${withdraw.userName || withdraw.userEmail}<br><small>${withdraw.userEmail}</small></td>
                            <td>${withdraw.amount}</td>
                            <td>${withdraw.method}</td>
                            <td>${withdraw.account}</td>
                            <td><span class="${statusClass}">${withdraw.status.toUpperCase()}</span></td>
                            <td>${date}</td>
                            <td>
                                ${withdraw.status === 'pending' ? `
                                    <button class="btn-approve" onclick="approveWithdraw('${withdraw.id}', ${withdraw.amount}, '${withdraw.userId}')">Approve</button>
                                    <button class="btn-reject" onclick="rejectWithdraw('${withdraw.id}')">Reject</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                });
                
                if (withdrawsArray.length === 0) {
                    html += '<tr><td colspan="8" style="text-align: center;">No withdrawal requests found</td></tr>';
                }
                
                html += '</tbody></table></div></div>';
                document.getElementById('adminContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading withdraws:', error);
                document.getElementById('adminContent').innerHTML = '<div class="section-card"><p>Error loading withdrawals</p></div>';
            }
        }
        
        // Load users
        async function loadUsers() {
            try {
                const snapshot = await db.ref('users').once('value');
                const users = snapshot.val() || {};
                const usersArray = Object.values(users).map((user, index) => ({ ...user, uid: Object.keys(users)[index] }));
                
                let html = `
                    <div class="section-card">
                        <h2 class="section-title"><i class="fas fa-users"></i> User Management</h2>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>Email</th><th>Name</th><th>Balance (VEVO)</th><th>Invites</th><th>Withdraw Code</th><th>Actions</th></tr>
                                </thead>
                                <tbody>
                `;
                
                usersArray.forEach(user => {
                    html += `
                        <tr>
                            <td>${user.email}</td>
                            <td>${user.name || '-'}</td>
                            <td>${user.balance || 0}</td>
                            <td>${user.inviteCount || 0}</td>
                            <td>${user.withdrawCode ? '✓ Set' : '❌ Not set'}</td>
                            <td>
                                <button class="btn-reset" onclick="resetWithdrawCode('${user.uid}')">Reset Code</button>
                                <button class="btn-approve" onclick="addBalance('${user.uid}', ${user.balance || 0})">Add Balance</button>
                            </td>
                        </tr>
                    `;
                });
                
                if (usersArray.length === 0) {
                    html += '<tr><td colspan="6" style="text-align: center;">No users found</td></tr>';
                }
                
                html += '</tbody></table></div></div>';
                document.getElementById('adminContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('adminContent').innerHTML = '<div class="section-card"><p>Error loading users</p></div>';
            }
        }
        
        // Load dashboard
        async function loadDashboard() {
            await loadStats();
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <h3>Total Users</h3>
                        <div class="number" id="statUserCount">0</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <h3>Pending Deposits</h3>
                        <div class="number" id="statPendingDeposits">0</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <h3>Pending Withdrawals</h3>
                        <div class="number" id="statPendingWithdraws">0</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-coins"></i>
                        <h3>Total VEVO in Circulation</h3>
                        <div class="number" id="statTotalBalance">0</div>
                    </div>
                </div>
                <div class="section-card">
                    <h2 class="section-title"><i class="fas fa-chart-line"></i> Quick Actions</h2>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <button onclick="loadAdminContent('deposits')" style="background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer;"><i class="fas fa-money-bill-wave"></i> Review Deposits</button>
                        <button onclick="loadAdminContent('withdraws')" style="background: #ff6b6b; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer;"><i class="fas fa-hand-holding-usd"></i> Review Withdrawals</button>
                        <button onclick="loadAdminContent('users')" style="background: #48bb78; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer;"><i class="fas fa-users"></i> Manage Users</button>
                    </div>
                </div>
            `;
            document.getElementById('adminContent').innerHTML = html;
            await loadStats();
        }
        
        // Load settings
        function loadSettings() {
            const html = `
                <div class="section-card">
                    <h2 class="section-title"><i class="fas fa-cog"></i> Admin Settings</h2>
                    <div style="padding: 20px;">
                        <h3>System Information</h3>
                        <p><strong>Admin:</strong> Abel</p>
                        <p><strong>Exchange Rate:</strong> 1 Birr = 1 VEVO | 1 USDT = 157 VEVO</p>
                        <p><strong>Referral Reward:</strong> 10 VEVO for every 5 invites</p>
                        <hr style="margin: 20px 0;">
                        <h3>Payment Details</h3>
                        <p><strong>M-Pesa:</strong> 0725032395 (Abenezer Shigute)</p>
                        <p><strong>TeleBirr:</strong> 0940980555 (Tenaye Hutalo)</p>
                        <p><strong>CBE Birr:</strong> 0940980555</p>
                        <p><strong>CBE Bank:</strong> 1000612391754</p>

            `;

        }
        
        // Approve deposit
        async function approveDeposit(depositId, vevoAmount, userId) {
            if (confirm('Approve this deposit? User will receive ' + vevoAmount + ' VEVO tokens.')) {
                try {
                    await db.ref(`deposits/${depositId}`).update({ status: 'approved', approvedAt: Date.now() });
                    const userRef = db.ref(`users/${userId}`);
                    const snapshot = await userRef.once('value');
                    const user = snapshot.val();
                    await userRef.update({ balance: (user.balance || 0) + vevoAmount });
                    alert('Deposit approved!');
                    loadAdminContent(currentTab);
                } catch (error) {
                    console.error('Error approving deposit:', error);
                    alert('Error approving deposit');
                }
            }
        }
        
        // Reject deposit
        async function rejectDeposit(depositId) {
            if (confirm('Reject this deposit?')) {
                try {
                    await db.ref(`deposits/${depositId}`).update({ status: 'rejected', rejectedAt: Date.now() });
                    alert('Deposit rejected!');
                    loadAdminContent(currentTab);
                } catch (error) {
                    console.error('Error rejecting deposit:', error);
                    alert('Error rejecting deposit');
                }
            }
        }
        
        // Approve withdraw
        async function approveWithdraw(withdrawId, amount, userId) {
            if (confirm('Approve this withdrawal? ' + amount + ' VEVO will be deducted from user balance.')) {
                try {
                    await db.ref(`withdraws/${withdrawId}`).update({ status: 'approved', approvedAt: Date.now() });
                    const userRef = db.ref(`users/${userId}`);
                    const snapshot = await userRef.once('value');
                    const user = snapshot.val();
                    await userRef.update({ balance: (user.balance || 0) - amount });
                    alert('Withdrawal approved!');
                    loadAdminContent(currentTab);
                } catch (error) {
                    console.error('Error approving withdraw:', error);
                    alert('Error approving withdrawal');
                }
            }
        }
        
        // Reject withdraw
        async function rejectWithdraw(withdrawId) {
            if (confirm('Reject this withdrawal?')) {
                try {
                    await db.ref(`withdraws/${withdrawId}`).update({ status: 'rejected', rejectedAt: Date.now() });
                    alert('Withdrawal rejected!');
                    loadAdminContent(currentTab);
                } catch (error) {
                    console.error('Error rejecting withdraw:', error);
                    alert('Error rejecting withdrawal');
                }
            }
        }
        
        // Reset withdraw code
        async function resetWithdrawCode(userId) {
            if (confirm('Reset withdrawal code for this user? They will need to set a new code.')) {
                try {
                    await db.ref(`users/${userId}`).update({ withdrawCode: null });
                    alert('Withdrawal code reset successfully!');
                    loadAdminContent('users');
                } catch (error) {
                    console.error('Error resetting code:', error);
                    alert('Error resetting code');
                }
            }
        }
        
        // Add balance
        async function addBalance(userId, currentBalance) {
            const amount = prompt('Enter amount to add (VEVO):');
            if (amount && !isNaN(amount) && amount > 0) {
                try {
                    await db.ref(`users/${userId}`).update({ balance: currentBalance + parseInt(amount) });
                    alert(`Added ${amount} VEVO to user balance!`);
                    loadAdminContent('users');
                } catch (error) {
                    console.error('Error adding balance:', error);
                    alert('Error adding balance');
                }
            }
        }
        
        // View screenshot
        function viewScreenshot(screenshotData) {
            const modal = document.getElementById('screenshotModal');
            const img = document.getElementById('screenshotImage');
            img.src = screenshotData;
            modal.style.display = 'block';
        }
        
        function closeScreenshotModal() {
            document.getElementById('screenshotModal').style.display = 'none';
        }
        
        // Load admin content based on tab
        async function loadAdminContent(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.dataset.tab === tab) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            switch(tab) {
                case 'dashboard':
                    await loadDashboard();
                    break;
                case 'deposits':
                    await loadDeposits();
                    break;
                case 'withdraws':
                    await loadWithdraws();
                    break;
                case 'users':
                    await loadUsers();
                    break;
                case 'settings':
                    loadSettings();
                    break;
                default:
                    await loadDashboard();
            }
        }
        
        // Event listeners
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                loadAdminContent(item.dataset.tab);
            });
        });
        
        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('screenshotModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
