<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEVOBet - Login & Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Header */
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-header i {
            font-size: 60px;
            color: #ffd700;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .logo-header h1 {
            color: white;
            font-size: 32px;
            letter-spacing: 2px;
        }

        .logo-header p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        /* Tab Buttons */
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Form Container */
        .form-container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form {
            display: block;
        }

        .form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #667eea;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .form-group input.error {
            border-color: #ff4757;
        }

        .error-message {
            color: #ff4757;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .promo-note {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .switch-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .switch-link {
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }

        .switch-link:hover {
            text-decoration: underline;
        }

        .terms {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-container {
                padding: 24px;
            }
            .logo-header i {
                font-size: 48px;
                padding: 15px;
            }
            .logo-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-header">
            <i class="fas fa-dice-d6"></i>
            <h1>VEVOBet</h1>
            <p>Your Ultimate Gaming Platform</p>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" id="loginTabBtn">🔐 Login</button>
            <button class="tab-btn" id="registerTabBtn">📝 Register</button>
        </div>

        <div class="form-container">
            <!-- Login Form -->
            <div id="loginForm" class="form">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email">
                        <span class="error-message" id="loginEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                        <span class="error-message" id="loginPasswordError"></span>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">Login</button>
                </form>
                <div class="switch-text">
                    Don't have an account? <span class="switch-link" onclick="switchToRegister()">Register Now</span>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="form hidden">
                <form id="registerFormElement">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name">
                        <span class="error-message" id="regNameError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="regEmail" placeholder="Enter your email">
                        <span class="error-message" id="regEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Create Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)">
                        <span class="error-message" id="regPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-gift"></i> Promo Code (Optional)</label>
                        <input type="text" id="regPromoCode" placeholder="Enter friend's promo code">
                        <div class="promo-note">Enter a promo code to get 100 VEVO bonus!</div>
                        <span class="error-message" id="regPromoError"></span>
                    </div>
                    <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
                </form>
                <div class="switch-text">
                    Already have an account? <span class="switch-link" onclick="switchToLogin()">Login Here</span>
                </div>
                <div class="terms">
                    By registering, you agree to our <a href="#">Terms of Service</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        
        // Generate promo code from user ID
        function generatePromoCode(userId) {
            return userId ? userId.substring(0, 8).toUpperCase() : '';
        }
        
        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'success' ? '#48bb78' : type === 'error' ? '#ff4757' : '#667eea';
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Clear all errors
        function clearErrors(formType) {
            const errors = formType === 'login' 
                ? ['loginEmailError', 'loginPasswordError']
                : ['regNameError', 'regEmailError', 'regPasswordError', 'regPromoError'];
            errors.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = '';
            });
            document.querySelectorAll('.form-group input').forEach(input => input.classList.remove('error'));
        }
        
        // Validate email
        function isValidEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }
        
        // Apply invite code during registration
        async function applyInviteCode(userId, promoCode) {
            if (!promoCode) return false;
            
            try {
                const usersRef = db.ref('users');
                const snapshot = await usersRef.once('value');
                let inviterId = null;
                
                snapshot.forEach(childSnapshot => {
                    const user = childSnapshot.val();
                    const userCode = generatePromoCode(childSnapshot.key);
                    if (userCode === promoCode.toUpperCase() && childSnapshot.key !== userId) {
                        inviterId = childSnapshot.key;
                    }
                });
                
                if (inviterId) {
                    await db.ref(`users/${userId}`).update({ invitedBy: inviterId });
                    
                    const inviterRef = db.ref(`users/${inviterId}`);
                    const inviterSnapshot = await inviterRef.once('value');
                    const inviterData = inviterSnapshot.val();
                    const newInviteCount = (inviterData.inviteCount || 0) + 1;
                    const newInvitees = [...(inviterData.invitees || []), userId];
                    
                    let reward = 0;
                    if (newInviteCount % 5 === 0) {
                        reward = 10;
                        await inviterRef.update({
                            balance: (inviterData.balance || 0) + reward,
                            inviteRewards: (inviterData.inviteRewards || 0) + reward
                        });
                    }
                    
                    await inviterRef.update({
                        inviteCount: newInviteCount,
                        invitees: newInvitees
                    });
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error applying invite code:', error);
                return false;
            }
        }
        
        // Register function
        async function register(name, email, password, promoCode) {
            clearErrors('register');
            let isValid = true;
            
            if (!name || name.trim().length < 2) {
                document.getElementById('regNameError').textContent = 'Name must be at least 2 characters';
                document.getElementById('regName').classList.add('error');
                isValid = false;
            }
            
            if (!email) {
                document.getElementById('regEmailError').textContent = 'Email is required';
                document.getElementById('regEmail').classList.add('error');
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('regEmailError').textContent = 'Please enter a valid email';
                document.getElementById('regEmail').classList.add('error');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('regPasswordError').textContent = 'Password is required';
                document.getElementById('regPassword').classList.add('error');
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('regPasswordError').textContent = 'Password must be at least 6 characters';
                document.getElementById('regPassword').classList.add('error');
                isValid = false;
            }
            
            if (!isValid) return false;
            
            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await user.updateProfile({ displayName: name });
                
                const userData = {
                    email: email,
                    name: name,
                    balance: 100,
                    withdrawCode: null,
                    inviteCount: 0,
                    inviteRewards: 0,
                    invitees: [],
                    createdAt: Date.now(),
                    lastLogin: Date.now()
                };
                
                await db.ref(`users/${user.uid}`).set(userData);
                
                if (promoCode && promoCode.trim()) {
                    const applied = await applyInviteCode(user.uid, promoCode.trim());
                    if (applied) {
                        showNotification('Promo code applied! You received 100 VEVO bonus!', 'success');
                    } else if (promoCode.trim()) {
                        showNotification('Promo code not found', 'error');
                    }
                }
                
                showNotification('Account created successfully! Welcome to VEVOBet!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                return true;
            } catch (error) {
                let errorMessage = 'Registration failed. ';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'This email is already registered. Please login instead.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password should be at least 6 characters.';
                } else {
                    errorMessage += error.message;
                }
                showNotification(errorMessage, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Create Account';
                return false;
            }
        }
        
        // Login function
        async function login(email, password) {
            clearErrors('login');
            let isValid = true;
            
            if (!email) {
                document.getElementById('loginEmailError').textContent = 'Email is required';
                document.getElementById('loginEmail').classList.add('error');
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('loginEmailError').textContent = 'Please enter a valid email';
                document.getElementById('loginEmail').classList.add('error');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('loginPasswordError').textContent = 'Password is required';
                document.getElementById('loginPassword').classList.add('error');
                isValid = false;
            }
            
            if (!isValid) return false;
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await db.ref(`users/${user.uid}`).update({ lastLogin: Date.now() });
                showNotification('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                return true;
            } catch (error) {
                let errorMessage = 'Login failed. ';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email. Please register first.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password. Please try again.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email format.';
                } else {
                    errorMessage += error.message;
                }
                showNotification(errorMessage, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
                return false;
            }
        }
        
        // Tab switching
        function switchToRegister() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
            clearErrors('login');
        }
        
        function switchToLogin() {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            registerTab.classList.remove('active');
            loginTab.classList.add('active');
            clearErrors('register');
        }
        
        // Event Listeners
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            await login(email, password);
        });
        
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const promoCode = document.getElementById('regPromoCode').value.trim();
            await register(name, email, password, promoCode);
        });
        
        loginTab.addEventListener('click', switchToLogin);
        registerTab.addEventListener('click', switchToRegister);
        
        // Real-time validation
        document.getElementById('regPassword').addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 6) {
                document.getElementById('regPasswordError').textContent = 'Password must be at least 6 characters';
                this.classList.add('error');
            } else {
                document.getElementById('regPasswordError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        document.getElementById('regEmail').addEventListener('input', function() {
            if (this.value.length > 0 && !isValidEmail(this.value)) {
                document.getElementById('regEmailError').textContent = 'Please enter a valid email';
                this.classList.add('error');
            } else {
                document.getElementById('regEmailError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        document.getElementById('regName').addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 2) {
                document.getElementById('regNameError').textContent = 'Name must be at least 2 characters';
                this.classList.add('error');
            } else {
                document.getElementById('regNameError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        // Check if user is already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
        
        // Check URL for referral code and auto-fill
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) {
            setTimeout(() => {
                switchToRegister();
                document.getElementById('regPromoCode').value = refCode;
                showNotification('Referral code detected! Complete registration to get bonus!', 'success');
            }, 500);
        }
        
        // Enter key support
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginFormElement').dispatchEvent(new Event('submit'));
            }
        });
        
        document.getElementById('regPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerFormElement').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
