<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEVOBet - Login & Register</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Login/Register Page Specific Styles */
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .auth-header .logo {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .auth-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #ff4757;
        }

        .error-message {
            color: #ff4757;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #f0f0f0;
            color: #666;
            font-size: 14px;
        }

        .switch-link {
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }

        .switch-link:hover {
            text-decoration: underline;
        }

        .promo-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .promo-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .promo-section label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        .terms {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 10px;
            }
            .auth-header {
                padding: 20px;
            }
            .auth-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-dice-d6"></i>
                </div>
                <h1>VEVOBet</h1>
                <p>Your Ultimate Gaming Platform</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                        <span class="error-message" id="loginEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <span class="error-message" id="loginPasswordError"></span>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">Login</button>
                </form>
                <div class="auth-footer">
                    Don't have an account? <span class="switch-link" onclick="switchToRegister()">Register Now</span>
                </div>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="auth-form" style="display: none;">
                <form id="registerFormElement">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                        <span class="error-message" id="regNameError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                        <span class="error-message" id="regEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)" required>
                        <span class="error-message" id="regPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                        <span class="error-message" id="regConfirmError"></span>
                    </div>
                    <div class="promo-section">
                        <label><i class="fas fa-gift"></i> Invite Code (Optional)</label>
                        <input type="text" id="regPromoCode" placeholder="Enter friend's promo code">
                        <span class="error-message" id="regPromoError"></span>
                    </div>
                    <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
                </form>
                <div class="auth-footer">
                    Already have an account? <span class="switch-link" onclick="switchToLogin()">Login Here</span>
                </div>
                <div class="terms">
                    By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // State variables
        let currentTab = 'login';
        let isLoading = false;
        
        // Helper function to generate promo code from user ID
        function generatePromoCode(userId) {
            return userId.substring(0, 8).toUpperCase();
        }
        
        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                <span>${message}</span>
            `;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#48bb78' : type === 'error' ? '#ff4757' : '#667eea'};
                color: white;
                padding: 12px 20px;
                border-radius: 10px;
                z-index: 2000;
                animation: slideInRight 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // Clear all error messages
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));
        }
        
        // Validate email
        function isValidEmail(email) {
            const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return re.test(email);
        }
        
        // Validate name
        function isValidName(name) {
            return name && name.trim().length >= 2;
        }
        
        // Validate password
        function isValidPassword(password) {
            return password && password.length >= 6;
        }
        
        // Login function
        async function login(email, password) {
            clearErrors();
            let isValid = true;
            
            if (!email) {
                document.getElementById('loginEmailError').textContent = 'Email is required';
                document.getElementById('loginEmail').classList.add('error');
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('loginEmailError').textContent = 'Please enter a valid email';
                document.getElementById('loginEmail').classList.add('error');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('loginPasswordError').textContent = 'Password is required';
                document.getElementById('loginPassword').classList.add('error');
                isValid = false;
            }
            
            if (!isValid) return false;
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Update last login
                await db.ref(`users/${user.uid}`).update({ lastLogin: Date.now() });
                
                showNotification('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
                return true;
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage += 'No account found with this email. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage += 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage += 'This account has been disabled.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                showNotification(errorMessage, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
                return false;
            }
        }
        
        // Apply invite code
        async function applyInviteCode(userId, promoCode) {
            if (!promoCode) return true;
            
            try {
                // Find user with this promo code
                const usersRef = db.ref('users');
                const snapshot = await usersRef.once('value');
                let inviterId = null;
                
                snapshot.forEach(childSnapshot => {
                    const user = childSnapshot.val();
                    const userCode = generatePromoCode(childSnapshot.key);
                    if (userCode === promoCode.toUpperCase() && childSnapshot.key !== userId) {
                        inviterId = childSnapshot.key;
                    }
                });
                
                if (inviterId) {
                    // Update current user
                    await db.ref(`users/${userId}`).update({ invitedBy: inviterId });
                    
                    // Update inviter's invite count and check for reward
                    const inviterRef = db.ref(`users/${inviterId}`);
                    const inviterSnapshot = await inviterRef.once('value');
                    const inviterData = inviterSnapshot.val();
                    const newInviteCount = (inviterData.inviteCount || 0) + 1;
                    const newInvitees = [...(inviterData.invitees || []), userId];
                    
                    let reward = 0;
                    if (newInviteCount % 5 === 0) {
                        reward = 10;
                        await inviterRef.update({
                            balance: (inviterData.balance || 0) + reward,
                            inviteRewards: (inviterData.inviteRewards || 0) + reward
                        });
                    }
                    
                    await inviterRef.update({
                        inviteCount: newInviteCount,
                        invitees: newInvitees
                    });
                    
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error applying invite code:', error);
                return false;
            }
        }
        
        // Register function
        async function register(name, email, password, confirmPassword, promoCode) {
            clearErrors();
            let isValid = true;
            
            if (!name) {
                document.getElementById('regNameError').textContent = 'Full name is required';
                document.getElementById('regName').classList.add('error');
                isValid = false;
            } else if (!isValidName(name)) {
                document.getElementById('regNameError').textContent = 'Name must be at least 2 characters';
                document.getElementById('regName').classList.add('error');
                isValid = false;
            }
            
            if (!email) {
                document.getElementById('regEmailError').textContent = 'Email is required';
                document.getElementById('regEmail').classList.add('error');
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('regEmailError').textContent = 'Please enter a valid email';
                document.getElementById('regEmail').classList.add('error');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('regPasswordError').textContent = 'Password is required';
                document.getElementById('regPassword').classList.add('error');
                isValid = false;
            } else if (!isValidPassword(password)) {
                document.getElementById('regPasswordError').textContent = 'Password must be at least 6 characters';
                document.getElementById('regPassword').classList.add('error');
                isValid = false;
            }
            
            if (!confirmPassword) {
                document.getElementById('regConfirmError').textContent = 'Please confirm your password';
                document.getElementById('regConfirmPassword').classList.add('error');
                isValid = false;
            } else if (password !== confirmPassword) {
                document.getElementById('regConfirmError').textContent = 'Passwords do not match';
                document.getElementById('regConfirmPassword').classList.add('error');
                isValid = false;
            }
            
            if (!isValid) return false;
            
            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
            
            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Update profile with name
                await user.updateProfile({ displayName: name });
                
                // Create user data in Realtime Database
                const userData = {
                    email: email,
                    name: name,
                    balance: 100, // Welcome bonus
                    withdrawCode: null,
                    inviteCount: 0,
                    inviteRewards: 0,
                    invitees: [],
                    depositRequests: [],
                    withdrawRequests: [],
                    createdAt: Date.now(),
                    lastLogin: Date.now()
                };
                
                await db.ref(`users/${user.uid}`).set(userData);
                
                // Apply invite code if provided
                if (promoCode && promoCode.trim()) {
                    const inviteApplied = await applyInviteCode(user.uid, promoCode.trim());
                    if (inviteApplied) {
                        showNotification('Invite code applied! You got 100 VEVO bonus!', 'success');
                    } else if (promoCode.trim()) {
                        showNotification('Invite code not found, but you still get 100 VEVO!', 'info');
                    }
                }
                
                showNotification('Account created successfully! Welcome to VEVOBet! You received 100 VEVO bonus!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
                return true;
            } catch (error) {
                console.error('Registration error:', error);
                let errorMessage = 'Registration failed. ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += 'This email is already registered. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    case 'auth/weak-password':
                        errorMessage += 'Password should be at least 6 characters.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                showNotification(errorMessage, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Create Account';
                return false;
            }
        }
        
        // Switch to register tab
        function switchToRegister() {
            currentTab = 'register';
            document.querySelector('.tab-btn.active').classList.remove('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearErrors();
        }
        
        // Switch to login tab
        function switchToLogin() {
            currentTab = 'login';
            document.querySelector('.tab-btn.active').classList.remove('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            clearErrors();
        }
        
        // Event Listeners
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            await login(email, password);
        });
        
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const promoCode = document.getElementById('regPromoCode').value.trim();
            await register(name, email, password, confirmPassword, promoCode);
        });
        
        // Add real-time validation
        document.getElementById('regPassword').addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 6) {
                document.getElementById('regPasswordError').textContent = 'Password must be at least 6 characters';
                this.classList.add('error');
            } else {
                document.getElementById('regPasswordError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        document.getElementById('regConfirmPassword').addEventListener('input', function() {
            const password = document.getElementById('regPassword').value;
            if (this.value !== password) {
                document.getElementById('regConfirmError').textContent = 'Passwords do not match';
                this.classList.add('error');
            } else {
                document.getElementById('regConfirmError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        document.getElementById('regEmail').addEventListener('input', function() {
            if (this.value.length > 0 && !isValidEmail(this.value)) {
                document.getElementById('regEmailError').textContent = 'Please enter a valid email';
                this.classList.add('error');
            } else {
                document.getElementById('regEmailError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        document.getElementById('regName').addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 2) {
                document.getElementById('regNameError').textContent = 'Name must be at least 2 characters';
                this.classList.add('error');
            } else {
                document.getElementById('regNameError').textContent = '';
                this.classList.remove('error');
            }
        });
        
        // Check if user is already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // User is already logged in, redirect to dashboard
                window.location.href = 'index.html';
            }
        });
        
        // Add enter key support
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginFormElement').dispatchEvent(new Event('submit'));
            }
        });
        
        document.getElementById('regConfirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerFormElement').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
