<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VEVOBet - Dama | Ethiopian Checkers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .game-logo i {
            margin-right: 10px;
            color: #ffd700;
        }

        .game-balance {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .game-balance i {
            color: #ffd700;
            margin-right: 8px;
        }

        .game-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-title h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .game-title p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
        }

        /* Main Game Layout */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Board Section */
        .board-section {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #ffd700;
        }

        .board-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }

        .board-header h2 {
            color: #ffd700;
            font-size: 24px;
        }

        .players-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }

        .player-info-card {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .player-info-card.red-turn {
            border: 2px solid #e74c3c;
            background: rgba(231,76,60,0.2);
        }

        .player-info-card.black-turn {
            border: 2px solid #2c3e50;
            background: rgba(44,62,80,0.2);
        }

        .player-color {
            font-size: 24px;
            font-weight: bold;
        }

        .player-color.red { color: #e74c3c; }
        .player-color.black { color: #2c3e50; }

        .pieces-count {
            font-size: 18px;
            margin-top: 5px;
            color: white;
        }

        /* Checkers Board */
        .board-container {
            display: flex;
            justify-content: center;
        }

        .board {
            background: #deb887;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        table {
            border-collapse: collapse;
            margin: 0 auto;
        }

        td {
            width: 60px;
            height: 60px;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            transition: all 0.2s;
        }

        @media (max-width: 600px) {
            td {
                width: 40px;
                height: 40px;
            }
            .piece {
                width: 32px;
                height: 32px;
                font-size: 20px;
            }
        }

        .dark-cell {
            background-color: #8B4513;
        }

        .light-cell {
            background-color: #DEB887;
        }

        .dark-cell.selected {
            background-color: #ffd700;
            box-shadow: inset 0 0 0 3px #ff8c00;
        }

        .dark-cell.valid-move {
            background-color: #48bb78;
            position: relative;
        }

        .dark-cell.valid-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: rgba(72,187,120,0.8);
            border-radius: 50%;
        }

        .piece {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        .piece.red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: 2px solid #ffd700;
        }

        .piece.black {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            border: 2px solid #ffd700;
        }

        .piece.king {
            position: relative;
        }

        .piece.king::after {
            content: '👑';
            position: absolute;
            font-size: 20px;
            top: -8px;
            right: -8px;
        }

        /* Game Controls */
        .game-controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .control-btn:hover {
            transform: scale(1.05);
        }

        .control-btn.reset {
            background: #ff4757;
        }

        /* Challenge Panel */
        .challenge-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
        }

        .challenge-panel h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .search-box button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        .bet-input {
            margin: 15px 0;
        }

        .bet-input label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .bet-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .challenge-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .players-list {
            max-height: 350px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .player-item:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .game-status {
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            text-align: center;
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .result-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            animation: popIn 0.3s ease;
            border: 3px solid #ffd700;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .result-win { color: #48bb78; font-size: 32px; font-weight: bold; }
        .result-loss { color: #ff4757; font-size: 32px; font-weight: bold; }
        .result-amount { font-size: 24px; margin-top: 10px; color: #ffd700; }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <div class="game-logo">
                <i class="fas fa-dice-d6"></i> VEVOBet
            </div>
            <div class="game-balance">
                <i class="fas fa-coins"></i> <span id="gameBalance">0</span> VEVO
            </div>
        </div>

        <div class="game-title">
            <h1><i class="fas fa-chess-board"></i> DAMA - Ethiopian Checkers <i class="fas fa-crown"></i></h1>
            <p>Traditional 8x8 Checkers | 12 pieces each | Winner takes 80% of pot!</p>
        </div>

        <div class="game-layout">
            <div class="board-section">
                <div class="board-header">
                    <h2><i class="fas fa-chess-board"></i> DAMA BOARD</h2>
                </div>
                
                <div class="players-info">
                    <div class="player-info-card" id="redPlayerCard">
                        <div class="player-color red">🔴 RED PLAYER</div>
                        <div class="pieces-count" id="redPiecesCount">Pieces: 12</div>
                        <div id="redPlayerName" style="color:white; font-size:12px;">Waiting...</div>
                    </div>
                    <div class="player-info-card" id="blackPlayerCard">
                        <div class="player-color black">⚫ BLACK PLAYER</div>
                        <div class="pieces-count" id="blackPiecesCount">Pieces: 12</div>
                        <div id="blackPlayerName" style="color:white; font-size:12px;">Waiting...</div>
                    </div>
                </div>

                <div class="board-container">
                    <div class="board" id="board"></div>
                </div>

                <div class="game-controls">
                    <button class="control-btn" id="resetGameBtn" onclick="resetLocalGame()">🔄 New Game</button>
                    <button class="control-btn" id="surrenderBtn" onclick="surrenderGame()">🏳️ Surrender</button>
                </div>

                <div class="game-status" id="gameStatus">
                    <i class="fas fa-info-circle"></i> Select a player to start a game
                </div>
            </div>

            <div class="challenge-panel">
                <h3><i class="fas fa-users"></i> Find Players</h3>
                <div class="search-box">
                    <input type="email" id="searchEmail" placeholder="Search by email...">
                    <button onclick="searchByEmail()"><i class="fas fa-search"></i> Search</button>
                </div>

                <div id="onlinePlayersList" class="players-list">
                    <div class="empty-state">Loading players...</div>
                </div>

                <div class="bet-input">
                    <label>💰 Bet Amount (VEVO)</label>
                    <input type="number" id="challengeBet" value="50" min="10" step="10">
                </div>
                <button class="challenge-btn" id="createGameBtn">
                    <i class="fas fa-plus-circle"></i> Create Dama Game
                </button>

                <div id="activeGamesList" class="players-list" style="margin-top: 20px;">
                    <div class="empty-state">No active games</div>
                </div>
            </div>
        </div>
    </div>

    <div id="resultModal" class="result-display" style="display: none;">
        <div id="resultContent"></div>
    </div>

    <script src="https://kit.fontawesome.com/a2e0a8c9d2.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        let currentUser = null;
        let userData = null;
        let userBalance = 0;
        let currentGameId = null;
        let gameListener = null;
        let onlineListener = null;
        let onlineUsers = {};
        
        // Dama Game State
        let board = [];
        let currentPlayer = 'red'; // red moves first
        let selectedRow = null;
        let selectedCol = null;
        let redPieces = 12;
        let blackPieces = 12;
        let gameActive = true;
        let myColor = null;
        
        // Initialize board with 12 pieces each on 8x8
        function initBoard() {
            board = Array(8).fill().map(() => Array(8).fill(null));
            
            // Place red pieces (top rows 0-2)
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        board[row][col] = { color: 'red', king: false };
                    }
                }
            }
            
            // Place black pieces (bottom rows 5-7)
            for (let row = 5; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        board[row][col] = { color: 'black', king: false };
                    }
                }
            }
            
            redPieces = 12;
            blackPieces = 12;
            currentPlayer = 'red';
            gameActive = true;
            selectedRow = null;
            selectedCol = null;
        }
        
        // Check if a piece can become king
        function checkKing(row, col, color) {
            if (color === 'red' && row === 7) {
                board[row][col].king = true;
                return true;
            }
            if (color === 'black' && row === 0) {
                board[row][col].king = true;
                return true;
            }
            return false;
        }
        
        // Get valid moves for a piece
        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (!piece || piece.color !== currentPlayer) return [];
            
            const moves = [];
            const directions = piece.king ? [[-1,-1], [-1,1], [1,-1], [1,1]] : 
                            (piece.color === 'red' ? [[1,-1], [1,1]] : [[-1,-1], [-1,1]]);
            
            // Check simple moves
            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;
                if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8 && !board[newRow][newCol]) {
                    moves.push({ row: newRow, col: newCol, capture: null });
                }
            }
            
            // Check capture moves
            for (const [dr, dc] of directions) {
                const midRow = row + dr;
                const midCol = col + dc;
                const newRow = row + dr * 2;
                const newCol = col + dc * 2;
                
                if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                    const midPiece = board[midRow][midCol];
                    const targetPiece = board[newRow][newCol];
                    if (midPiece && midPiece.color !== currentPlayer && !targetPiece) {
                        moves.push({ row: newRow, col: newCol, capture: { row: midRow, col: midCol } });
                    }
                }
            }
            
            return moves;
        }
        
        // Check if player has any valid moves
        function hasAnyValidMoves(color) {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece && piece.color === color) {
                        const moves = getValidMoves(row, col);
                        if (moves.length > 0) return true;
                    }
                }
            }
            return false;
        }
        
        // Make a move
        function makeMove(fromRow, fromCol, toRow, toCol, capture) {
            const piece = board[fromRow][fromCol];
            board[toRow][toCol] = { ...piece };
            board[fromRow][fromCol] = null;
            
            if (capture) {
                board[capture.row][capture.col] = null;
                if (piece.color === 'red') blackPieces--;
                else redPieces--;
            }
            
            checkKing(toRow, toCol, piece.color);
            
            // Check for additional captures
            const newMoves = getValidMoves(toRow, toCol);
            const additionalCaptures = newMoves.filter(m => m.capture);
            
            if (additionalCaptures.length > 0 && capture) {
                // Can continue capturing
                selectedRow = toRow;
                selectedCol = toCol;
                renderBoard();
                return false;
            }
            
            // Switch player
            currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
            selectedRow = null;
            selectedCol = null;
            
            // Check win condition
            if (redPieces === 0 || blackPieces === 0 || !hasAnyValidMoves(currentPlayer)) {
                endGame(currentPlayer === 'red' ? 'black' : 'red');
            }
            
            return true;
        }
        
        // End game and transfer tokens
        async function endGame(winner) {
            if (!gameActive) return;
            gameActive = false;
            
            if (currentGameId) {
                const gameSnap = await db.ref(`damaGames/${currentGameId}`).once('value');
                const game = gameSnap.val();
                
                if (game && game.status === 'active') {
                    const winnerPayout = game.winnerPayout;
                    const isWinner = (winner === 'red' && game.redPlayerId === currentUser?.uid) ||
                                    (winner === 'black' && game.blackPlayerId === currentUser?.uid);
                    
                    if (isWinner) {
                        await updateUserBalance(userBalance + winnerPayout);
                        showResult(true, winnerPayout);
                    } else {
                        showResult(false, 0);
                    }
                    
                    await db.ref(`damaGames/${currentGameId}`).update({
                        status: 'completed',
                        winner: winner,
                        winnerId: winner === 'red' ? game.redPlayerId : game.blackPlayerId,
                        completedAt: Date.now()
                    });
                }
            }
            
            updateGameStatus();
        }
        
        // Handle cell click
        function handleCellClick(row, col) {
            if (!gameActive || !currentGameId) return;
            if (currentPlayer !== myColor) {
                showNotification("Not your turn!", "error");
                return;
            }
            
            const piece = board[row][col];
            
            if (selectedRow !== null) {
                const moves = getValidMoves(selectedRow, selectedCol);
                const validMove = moves.find(m => m.row === row && m.col === col);
                
                if (validMove) {
                    makeMove(selectedRow, selectedCol, row, col, validMove.capture);
                    renderBoard();
                    updateGameStatus();
                    
                    // Save game state to Firebase
                    if (currentGameId) {
                        db.ref(`damaGames/${currentGameId}`).update({
                            boardState: board,
                            currentPlayer: currentPlayer,
                            redPieces: redPieces,
                            blackPieces: blackPieces,
                            lastMove: Date.now()
                        });
                    }
                } else {
                    selectedRow = null;
                    handleCellClick(row, col);
                }
            } else if (piece && piece.color === currentPlayer) {
                const moves = getValidMoves(row, col);
                if (moves.length > 0) {
                    selectedRow = row;
                    selectedCol = col;
                    renderBoard();
                }
            }
        }
        
        // Render the board
        function renderBoard() {
            const boardContainer = document.getElementById('board');
            const table = document.createElement('table');
            
            for (let row = 0; row < 8; row++) {
                const tr = document.createElement('tr');
                for (let col = 0; col < 8; col++) {
                    const td = document.createElement('td');
                    const isDark = (row + col) % 2 === 1;
                    td.className = isDark ? 'dark-cell' : 'light-cell';
                    
                    if (selectedRow === row && selectedCol === col) {
                        td.classList.add('selected');
                    }
                    
                    const moves = (selectedRow !== null) ? getValidMoves(selectedRow, selectedCol) : [];
                    if (moves.some(m => m.row === row && m.col === col)) {
                        td.classList.add('valid-move');
                    }
                    
                    const piece = board[row][col];
                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = `piece ${piece.color}`;
                        if (piece.king) pieceDiv.classList.add('king');
                        pieceDiv.innerHTML = piece.king ? '👑' : '●';
                        td.appendChild(pieceDiv);
                    }
                    
                    td.onclick = (function(r, c) { return function() { handleCellClick(r, c); }; })(row, col);
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            
            boardContainer.innerHTML = '';
            boardContainer.appendChild(table);
            
            document.getElementById('redPiecesCount').textContent = `Pieces: ${redPieces}`;
            document.getElementById('blackPiecesCount').textContent = `Pieces: ${blackPieces}`;
        }
        
        function updateGameStatus() {
            const statusDiv = document.getElementById('gameStatus');
            if (!gameActive) {
                statusDiv.innerHTML = '<i class="fas fa-trophy"></i> Game Over!';
                return;
            }
            
            const turnText = currentPlayer === 'red' ? '🔴 RED' : '⚫ BLACK';
            statusDiv.innerHTML = `<i class="fas fa-hourglass-half"></i> ${turnText}'s Turn`;
        }
        
        function resetLocalGame() {
            initBoard();
            renderBoard();
            updateGameStatus();
            gameActive = true;
        }
        
        function showResult(isWinner, amount) {
            const modal = document.getElementById('resultModal');
            const content = document.getElementById('resultContent');
            
            if (isWinner) {
                content.innerHTML = `
                    <div class="result-win">🎉 VICTORY! 🎉</div>
                    <div>You won the Dama game!</div>
                    <div class="result-amount">+${amount} VEVO</div>
                    <div style="margin-top: 10px; font-size: 14px;">80% of pot goes to winner!</div>
                `;
            } else {
                content.innerHTML = `
                    <div class="result-loss">💀 DEFEAT! 💀</div>
                    <div>You lost the game</div>
                    <div style="margin-top: 10px; font-size: 14px;">Better luck next time!</div>
                `;
            }
            
            modal.style.display = 'block';
            setTimeout(() => modal.style.display = 'none', 4000);
        }
        
        async function surrenderGame() {
            if (!currentGameId || !gameActive) return;
            if (myColor !== currentPlayer) {
                showNotification("It's not your turn to surrender?", "error");
                return;
            }
            await endGame(currentPlayer === 'red' ? 'black' : 'red');
        }
        
        // Firebase Functions
        function updateBalanceDisplay() {
            document.getElementById('gameBalance').textContent = userBalance;
        }
        
        async function loadUserData() {
            if (!currentUser) return;
            const snapshot = await db.ref(`users/${currentUser.uid}`).once('value');
            if (snapshot.exists()) {
                userData = snapshot.val();
                userBalance = userData.balance || 100;
                updateBalanceDisplay();
            } else {
                const newUserData = {
                    email: currentUser.email,
                    name: currentUser.displayName || currentUser.email.split('@')[0],
                    balance: 100,
                    withdrawCode: null,
                    inviteCount: 0,
                    inviteRewards: 0,
                    createdAt: Date.now()
                };
                await db.ref(`users/${currentUser.uid}`).set(newUserData);
                userData = newUserData;
                userBalance = 100;
                updateBalanceDisplay();
            }
        }
        
        async function updateUserBalance(newBalance) {
            if (!currentUser) return;
            await db.ref(`users/${currentUser.uid}`).update({ balance: newBalance });
            userBalance = newBalance;
            updateBalanceDisplay();
        }
        
        function setUserOnline() {
            if (!currentUser) return;
            db.ref(`onlineUsers/${currentUser.uid}`).set({
                uid: currentUser.uid,
                name: userData?.name || currentUser.email.split('@')[0],
                email: currentUser.email,
                balance: userBalance,
                lastSeen: Date.now()
            }).onDisconnect().remove();
        }
        
        function loadOnlineUsers() {
            if (onlineListener) onlineListener.off();
            onlineListener = db.ref('onlineUsers').on('value', (snapshot) => {
                onlineUsers = snapshot.val() || {};
                updateOnlinePlayersList();
            });
        }
        
        function updateOnlinePlayersList() {
            const container = document.getElementById('onlinePlayersList');
            const users = Object.values(onlineUsers).filter(u => u.uid !== currentUser?.uid);
            
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state">No other players online</div>';
                return;
            }
            
            container.innerHTML = users.map(user => `
                <div class="player-item" onclick="challengePlayer('${user.uid}', '${user.name}')">
                    <div>
                        <i class="fas fa-user-circle"></i>
                        <strong>${user.name}</strong><br>
                        <small>${user.email}</small>
                    </div>
                    <div>
                        <span style="color:#48bb78;">${user.balance || 100} VEVO</span>
                        <button class="challenge-small-btn" style="background:#667eea; color:white; border:none; padding:5px 12px; border-radius:20px;">Challenge</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function searchByEmail() {
            const email = document.getElementById('searchEmail').value.trim().toLowerCase();
            if (!email) return;
            
            const usersSnap = await db.ref('users').orderByChild('email').equalTo(email).once('value');
            const user = usersSnap.val();
            
            if (!user || Object.keys(user).length === 0) {
                showNotification('User not found', 'error');
                return;
            }
            
            const [userId, userInfo] = Object.entries(user)[0];
            if (userId === currentUser?.uid) {
                showNotification('That\'s you!', 'error');
                return;
            }
            
            if (confirm(`Challenge ${userInfo.name} to a Dama game?`)) {
                challengePlayer(userId, userInfo.name);
            }
        }
        
        async function challengePlayer(playerId, playerName) {
            if (!currentUser) return;
            
            const betAmount = parseInt(document.getElementById('challengeBet').value);
            if (isNaN(betAmount) || betAmount < 10) {
                showNotification('Minimum bet is 10 VEVO', 'error');
                return;
            }
            
            if (betAmount > userBalance) {
                showNotification(`Insufficient balance! You have ${userBalance} VEVO`, 'error');
                return;
            }
            
            const gameId = Date.now().toString();
            const game = {
                id: gameId,
                redPlayerId: currentUser.uid,
                redPlayerName: userData?.name || currentUser.email.split('@')[0],
                blackPlayerId: playerId,
                blackPlayerName: playerName,
                betAmount: betAmount,
                totalPot: betAmount * 2,
                winnerPayout: Math.floor(betAmount * 2 * 0.8),
                houseFee: Math.floor(betAmount * 2 * 0.2),
                status: 'waiting',
                boardState: null,
                currentPlayer: 'red',
                redPieces: 12,
                blackPieces: 12,
                createdAt: Date.now()
            };
            
            await db.ref(`damaGames/${gameId}`).set(game);
            showNotification(`Challenge sent to ${playerName}!`, 'success');
            loadActiveGames();
        }
        
        async function createGame() {
            if (!currentUser) return;
            
            const betAmount = parseInt(document.getElementById('challengeBet').value);
            if (isNaN(betAmount) || betAmount < 10) {
                showNotification('Minimum bet is 10 VEVO', 'error');
                return;
            }
            
            if (betAmount > userBalance) {
                showNotification(`Insufficient balance! You have ${userBalance} VEVO`, 'error');
                return;
            }
            
            const gameId = Date.now().toString();
            const game = {
                id: gameId,
                redPlayerId: currentUser.uid,
                redPlayerName: userData?.name || currentUser.email.split('@')[0],
                blackPlayerId: null,
                blackPlayerName: 'Waiting...',
                betAmount: betAmount,
                totalPot: betAmount * 2,
                winnerPayout: Math.floor(betAmount * 2 * 0.8),
                houseFee: Math.floor(betAmount * 2 * 0.2),
                status: 'waiting',
                boardState: null,
                currentPlayer: 'red',
                redPieces: 12,
                blackPieces: 12,
                createdAt: Date.now()
            };
            
            await db.ref(`damaGames/${gameId}`).set(game);
            showNotification('Game created! Share game ID or wait for player', 'success');
            loadActiveGames();
            joinGame(gameId);
        }
        
        async function joinGame(gameId) {
            const gameSnap = await db.ref(`damaGames/${gameId}`).once('value');
            const game = gameSnap.val();
            
            if (!game) return;
            
            if (game.blackPlayerId === null && game.redPlayerId !== currentUser?.uid) {
                const betAmount = game.betAmount;
                if (betAmount > userBalance) {
                    showNotification(`Insufficient balance! Need ${betAmount} VEVO`, 'error');
                    return;
                }
                
                await updateUserBalance(userBalance - betAmount);
                
                await db.ref(`damaGames/${gameId}`).update({
                    blackPlayerId: currentUser.uid,
                    blackPlayerName: userData?.name || currentUser.email.split('@')[0],
                    status: 'active',
                    boardState: null
                });
                
                showNotification(`Joined game against ${game.redPlayerName}!`, 'success');
            }
            
            currentGameId = gameId;
            myColor = game.redPlayerId === currentUser?.uid ? 'red' : 'black';
            
            if (gameListener) gameListener.off();
            gameListener = db.ref(`damaGames/${gameId}`).on('value', (snapshot) => {
                const updatedGame = snapshot.val();
                if (updatedGame) {
                    if (updatedGame.status === 'active') {
                        if (!updatedGame.boardState) {
                            initBoard();
                        } else {
                            board = updatedGame.boardState;
                            currentPlayer = updatedGame.currentPlayer;
                            redPieces = updatedGame.redPieces;
                            blackPieces = updatedGame.blackPieces;
                            gameActive = true;
                        }
                        renderBoard();
                        updateGameStatus();
                    }
                    
                    document.getElementById('redPlayerName').textContent = updatedGame.redPlayerName;
                    document.getElementById('blackPlayerName').textContent = updatedGame.blackPlayerName || 'Waiting...';
                    
                    if (updatedGame.status === 'completed') {
                        gameActive = false;
                        updateGameStatus();
                    }
                }
            });
        }
        
        async function loadActiveGames() {
            const gamesSnap = await db.ref('damaGames').orderByChild('status').equalTo('waiting').once('value');
            const games = gamesSnap.val();
            const container = document.getElementById('activeGamesList');
            
            if (!games || Object.keys(games).length === 0) {
                container.innerHTML = '<div class="empty-state">No active Dama games</div>';
                return;
            }
            
            let html = '';
            for (const [id, game] of Object.entries(games)) {
                if (game.redPlayerId !== currentUser?.uid) {
                    html += `
                        <div class="player-item" onclick="joinGame('${id}')">
                            <div>
                                <i class="fas fa-chess-board"></i>
                                <strong>${game.redPlayerName}</strong>
                            </div>
                            <div>
                                <span style="color:#ffd700;">${game.betAmount} VEVO</span>
                                <button class="challenge-small-btn" style="background:#48bb78; color:white; border:none; padding:5px 12px; border-radius:20px;">Join</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html || '<div class="empty-state">No available games</div>';
        }
        
        function showNotification(msg, type) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.style.background = type === 'success' ? '#48bb78' : type === 'error' ? '#ff4757' : '#667eea';
            n.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // Event listeners
        document.getElementById('createGameBtn').addEventListener('click', createGame);
        
        // Auth state
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
                setUserOnline();
                loadOnlineUsers();
                loadActiveGames();
                initBoard();
                renderBoard();
                
                setInterval(() => setUserOnline(), 30000);
                setInterval(() => loadActiveGames(), 5000);
            } else {
                window.location.href = 'index.html';
            }
        });
        
        // Make functions global
        window.searchByEmail = searchByEmail;
        window.challengePlayer = challengePlayer;
        window.joinGame = joinGame;
        window.createGame = createGame;
        window.resetLocalGame = resetLocalGame;
        window.surrenderGame = surrenderGame;
    </script>
</body>
</html>
